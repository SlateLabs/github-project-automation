# Participating Repos Configuration
# Lists repos under SlateLabs that participate in the orchestration workflow.
#
# Schema per entry:
#   repo:                     org/repo-name
#   enabled_stages:           list of stage transitions this repo opts into
#   shared_workflow_version:  pinned ref for shared reusable workflows

repos:
  - repo: SlateLabs/github-project-automation
    enabled_stages:
      - kickoff
      - clarification
      - design
      - plan
      - execution
      - review
      - merge
      - closeout
    # Pin to a release tag or SHA — never a mutable branch (see discussion #3 §2)
    shared_workflow_version: 08cf90ef668d27986151c19194f7632e210d1820
