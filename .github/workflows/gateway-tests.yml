name: Gateway Tests

on:
  push:
    paths:
      - 'gateway/**'
      - 'tests/**'
      - 'config/**'
      - 'scripts/**'
      - 'AUTOMATION.md'
      - 'requirements.txt'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'gateway/**'
      - 'tests/**'
      - 'config/**'
      - 'scripts/**'
      - 'AUTOMATION.md'
      - 'requirements.txt'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
