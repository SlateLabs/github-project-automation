name: Operator Review Intake
run-name: >-
  ${{ format('Review intake (#{0}) - {1}',
            github.event.issue.number,
            startsWith(github.event.comment.body, 'gpa:approve') && 'approve' || 'feedback') }}

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  intake:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse command
        id: command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        shell: bash
        run: |
          set -euo pipefail

          body_file=$(mktemp)
          printf '%s' "$COMMENT_BODY" > "$body_file"

          python3 - "$body_file" >> "$GITHUB_OUTPUT" <<'PY'
          import pathlib, sys

          body = pathlib.Path(sys.argv[1]).read_text()
          trimmed = body.lstrip()
          command = ""
          stage = ""
          feedback = ""

          if trimmed.lower().startswith("gpa:approve"):
              command = "approve"
              stage = "merge"
          elif trimmed.lower().startswith("gpa:feedback"):
              command = "feedback"
              stage = "feedback-implementation"
              feedback = trimmed[len("gpa:feedback"):].strip()

          print(f"command={command}")
          print(f"stage={stage}")
          print("feedback_body<<EOF")
          print(feedback)
          print("EOF")
          PY

      - name: Exit when comment is not an operator command
        if: steps.command.outputs.command == ''
        shell: bash
        run: |
          echo "::notice::Comment is not a GPA operator command; skipping"

      - name: Fail on empty feedback body
        if: steps.command.outputs.command == 'feedback' && steps.command.outputs.feedback_body == ''
        shell: bash
        run: |
          echo "::error::gpa:feedback requires non-empty instructions"
          exit 1

      - name: Validate trusted actor
        if: steps.command.outputs.command != ''
        env:
          ACTOR: ${{ github.event.comment.user.login }}
        shell: bash
        run: |
          set -euo pipefail

          trusted_user_match=$(grep -A 100 '^trusted_users:' config/trust-policy.yml | grep -E "^\s*-\s+$ACTOR\s*$" || true)
          if [ -z "$trusted_user_match" ]; then
            echo "::error::Actor '$ACTOR' is not in trusted_users"
            exit 1
          fi

      - name: Create orchestration app token
        if: steps.command.outputs.command != '' && vars.ORCHESTRATION_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-organization-projects: write

      - name: Recover project item context
        if: steps.command.outputs.command != ''
        id: project-context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "project_item_id=" >> "$GITHUB_OUTPUT"
            echo "::notice::No app token available for project item recovery"
            exit 0
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          query=$(cat <<'GRAPHQL'
          query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              issue(number: $number) {
                title
                projectItems(first: 20) {
                  nodes {
                    id
                    project {
                      ... on ProjectV2 {
                        id
                        title
                        closed
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          payload=$(gh api graphql -f query="$query" -f owner="$owner" -f repo="$repo" -F number="$ISSUE_NUMBER")
          recovered_id=$(echo "$payload" | jq -r '
            .data.repository.issue.projectItems.nodes
            | map(select(.project.closed == false))
            | (map(select(.project.title == "Workflow Orchestration")) + .)
            | map(.id)
            | .[0] // ""
          ')
          issue_title=$(echo "$payload" | jq -r '.data.repository.issue.title // "Issue"')

          echo "project_item_id=$recovered_id" >> "$GITHUB_OUTPUT"
          {
            echo 'issue_title<<EOF'
            printf '%s\n' "$issue_title"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Sync project Status to In Progress for feedback
        if: steps.command.outputs.command == 'feedback' && steps.project-context.outputs.project_item_id != '' && steps.app-token.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ITEM_ID: ${{ steps.project-context.outputs.project_item_id }}
        shell: bash
        run: |
          set -euo pipefail

          metadata_query=$(cat <<'GRAPHQL'
          query($itemId: ID!) {
            node(id: $itemId) {
              ... on ProjectV2Item {
                id
                project {
                  ... on ProjectV2 {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          metadata=$(gh api graphql -f query="$metadata_query" -F itemId="$PROJECT_ITEM_ID")
          project_id=$(echo "$metadata" | jq -r '.data.node.project.id // empty')
          status_field_id=$(echo "$metadata" | jq -r '.data.node.project.fields.nodes[] | select(.name == "Status") | .id' | head -1)
          status_option_id=$(echo "$metadata" | jq -r '.data.node.project.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "In Progress") | .id' | head -1)

          mutation=$(cat <<'GRAPHQL'
          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }
            ) {
              projectV2Item { id }
            }
          }
          GRAPHQL
          )

          gh api graphql \
            -f query="$mutation" \
            -F projectId="$project_id" \
            -F itemId="$PROJECT_ITEM_ID" \
            -F fieldId="$status_field_id" \
            -F optionId="$status_option_id" >/dev/null

      - name: Generate run key
        if: steps.command.outputs.command != ''
        id: run-key
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STAGE: ${{ steps.command.outputs.stage }}
        shell: bash
        run: |
          timestamp=$(date +%s%3N)
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
          echo "run_key=${REPO_NAME}/${ISSUE_NUMBER}/${STAGE}/${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Dispatch orchestration stage
        if: steps.command.outputs.command != ''
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RECOVERED_ISSUE_TITLE: ${{ steps.project-context.outputs.issue_title }}
          EVENT_ISSUE_TITLE: ${{ github.event.issue.title }}
          STAGE: ${{ steps.command.outputs.stage }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          TIMESTAMP: ${{ steps.run-key.outputs.timestamp }}
          ACTOR: ${{ github.event.comment.user.login }}
          PROJECT_ITEM_ID: ${{ steps.project-context.outputs.project_item_id }}
          FEEDBACK_BODY: ${{ steps.command.outputs.feedback_body }}
        shell: bash
        run: |
          set -euo pipefail

          GH_TOKEN="${APP_TOKEN:-$FALLBACK_TOKEN}"
          ISSUE_TITLE="${RECOVERED_ISSUE_TITLE:-$EVENT_ISSUE_TITLE}"

          gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=orchestration-start \
            -F "client_payload[issue_number]=$ISSUE_NUMBER" \
            -f "client_payload[issue_title]=$ISSUE_TITLE" \
            -f "client_payload[requested_stage]=$STAGE" \
            -f "client_payload[run_key]=$RUN_KEY" \
            -f "client_payload[actor]=$ACTOR" \
            -f "client_payload[timestamp]=$TIMESTAMP" \
            -f "client_payload[project_item_id]=$PROJECT_ITEM_ID" \
            -f "client_payload[feedback_source]=operator" \
            -f "client_payload[feedback_body]=$FEEDBACK_BODY"

      - name: Acknowledge operator command
        if: steps.command.outputs.command != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          STAGE: ${{ steps.command.outputs.stage }}
          ACTOR: ${{ github.event.comment.user.login }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Operator command accepted
          <!-- gpa:run-status:${STAGE}:started:${RUN_KEY} -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`${RUN_KEY}\` |
          | **Requested stage** | \`${STAGE}\` |
          | **Actor** | @${ACTOR} |
          | **Result** | :rocket: Operator command accepted |
          | **Actions run** | [${RUN_ID}](${RUN_URL}) |
          COMMENT_EOF
          )"
