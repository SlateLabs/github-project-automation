name: Scaffold Design Discussion

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to create a design discussion for'
        required: true
        type: number
      run_key:
        description: 'Optional existing run key to preserve correlation across wrapper workflows'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  discussions: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          PROVIDED_RUN_KEY: ${{ inputs.run_key }}
        run: |
          if [ -n "${PROVIDED_RUN_KEY:-}" ]; then
            run_key="$PROVIDED_RUN_KEY"
          else
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/design-scaffold/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key"

      - name: Validate eligibility
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: design
          actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Design discussion scaffold — ineligible
          <!-- gpa:run-status:design:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

      - name: Scaffold design discussion
        if: steps.eligibility.outputs.eligible == 'true'
        id: scaffold
        uses: ./.github/actions/scaffold-design-discussion
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ github.actor }}

      - name: Query run history
        if: always()
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          DISCUSSION_URL: ${{ steps.scaffold.outputs.discussion_url }}
          CREATED: ${{ steps.scaffold.outputs.created }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
        shell: bash
        run: |
          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Design Discussion Scaffold Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Discussion URL | ${DISCUSSION_URL:-n/a} |"
            echo "| Created | ${CREATED:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- Fill in the design discussion with all required gate headings"
            echo "- Resolve open questions and get at least one review comment"
            echo "- Re-trigger \`orchestration-dispatch\` with \`requested_stage: design\` to pass the gate"
          } >> "$GITHUB_STEP_SUMMARY"
