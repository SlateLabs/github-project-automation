name: Retry Stage

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to retry a stage for'
        required: true
        type: number
      target_stage:
        description: 'Stage to retry'
        required: true
        type: choice
        options:
          - design
          - plan
          - execution
          - follow-up-capture
          - closeout

permissions:
  contents: read
  issues: write

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          TARGET_STAGE: ${{ inputs.target_stage }}
        run: |
          timestamp=$(date +%s%3N)
          run_key="${REPO_NAME}/${ISSUE_NUM}/${TARGET_STAGE}/${timestamp}"
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key"

      - name: Validate eligibility
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: ${{ inputs.target_stage }}
          actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_STAGE: ${{ inputs.target_stage }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Retry stage — ineligible
          <!-- gpa:run-status:$TARGET_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Target stage** | \`$TARGET_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible for retry |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible for retry: $REASON"
          exit 1

      - name: Dispatch canonical orchestrator
        if: steps.eligibility.outputs.eligible == 'true'
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          TARGET_STAGE: ${{ inputs.target_stage }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          # Map target_stage to the canonical orchestration requested_stage.
          case "$TARGET_STAGE" in
            design)
              requested_stage="design"
              ;;
            plan)
              requested_stage="plan"
              ;;
            execution)
              requested_stage="execution"
              ;;
            follow-up-capture)
              requested_stage="follow-up-capture"
              ;;
            closeout)
              requested_stage="closeout"
              ;;
            *)
              echo "::error::Unknown target stage: $TARGET_STAGE"
              exit 1
              ;;
          esac

          timestamp=$(printf '%s' "$RUN_KEY" | rev | cut -d/ -f1 | rev)
          echo "::notice::Dispatching orchestration-dispatch.yml for issue #$ISSUE_NUMBER (stage: $requested_stage, run key: $RUN_KEY)"

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/dispatches" \
            -f "event_type=orchestration-start" \
            -F "client_payload[issue_number]=$ISSUE_NUMBER" \
            -f "client_payload[requested_stage]=$requested_stage" \
            -f "client_payload[run_key]=$RUN_KEY" \
            -f "client_payload[actor]=$ACTOR" \
            -f "client_payload[timestamp]=$timestamp" 2>&1 || {
            echo "::error::Failed to dispatch orchestration-dispatch.yml"

            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Retry stage — dispatch failed
          <!-- gpa:run-status:$TARGET_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Target stage** | \`$TARGET_STAGE\` |
          | **Workflow** | \`orchestration-dispatch.yml\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Failed to dispatch orchestrator |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
            )"
            exit 1
          }

          echo "workflow_file=orchestration-dispatch.yml" >> "$GITHUB_OUTPUT"
          echo "requested_stage=$requested_stage" >> "$GITHUB_OUTPUT"

          # Post retry dispatched comment
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Retry stage — dispatched
          <!-- gpa:run-status:$TARGET_STAGE:started:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Target stage** | \`$TARGET_STAGE\` |
          | **Workflow** | \`orchestration-dispatch.yml\` |
          | **Actor** | @$ACTOR |
          | **Result** | :arrows_counterclockwise: Retry dispatched |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          The canonical orchestrator has been dispatched for issue #$ISSUE_NUMBER with \`requested_stage: $requested_stage\`.
          Check the Actions tab for the dispatched run status.
          COMMENT_EOF
          )"

      - name: Query run history
        if: always()
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          TARGET_STAGE: ${{ inputs.target_stage }}
          WORKFLOW_FILE: ${{ steps.dispatch.outputs.workflow_file }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
        shell: bash
        run: |
          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Retry Stage Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Target stage | \`$TARGET_STAGE\` |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Dispatched workflow | ${WORKFLOW_FILE:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- Check the [Actions tab](https://github.com/$REPO/actions) for the dispatched workflow run"
            echo "- The dispatched workflow will post its own status comment on issue [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER)"
          } >> "$GITHUB_STEP_SUMMARY"
