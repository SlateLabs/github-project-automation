name: Validate Agent Integrations
run-name: validate-agent-integrations

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are present
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Missing OPENAI_API_KEY"; exit 1; }
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Missing ANTHROPIC_API_KEY"; exit 1; }

      - name: Codex API key healthcheck
        uses: openai/codex-action@v1
        with:
          prompt: >-
            Reply with exactly the text OPENAI-KEY-OK and nothing else.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-file: ${{ runner.temp }}/codex-healthcheck.txt

      - name: Verify Codex response
        shell: bash
        run: |
          set -euo pipefail
          output="$(tr -d '\r' < "$RUNNER_TEMP/codex-healthcheck.txt" | xargs)"
          [ "$output" = "OPENAI-KEY-OK" ] || {
            echo "::error::Unexpected Codex response: $output"
            exit 1
          }

      - name: Claude API key healthcheck
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          response=$(curl --silent --show-error --fail https://api.anthropic.com/v1/messages \
            --header "x-api-key: $ANTHROPIC_API_KEY" \
            --header "anthropic-version: 2023-06-01" \
            --header "content-type: application/json" \
            --data '{
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 16,
              "messages": [
                {"role": "user", "content": "Reply with exactly ANTHROPIC-KEY-OK"}
              ]
            }')

          text=$(printf '%s' "$response" | jq -r '.content[0].text // ""' | tr -d '\r' | xargs)
          [ "$text" = "ANTHROPIC-KEY-OK" ] || {
            echo "::error::Unexpected Anthropic response: $text"
            exit 1
          }

      - name: Invoke Claude Code with trivial prompt
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Reply with exactly the word Hi.
          show_full_output: ${{ vars.ORCHESTRATION_CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          claude_args: >-
            --max-turns 1

      - name: Summarize outputs
        shell: bash
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
          SESSION_ID: ${{ steps.claude.outputs.session_id }}
        run: |
          set -euo pipefail
          {
            echo "## Agent Integration Validation"
            echo ""
            echo "- Codex key check: \`passed\`"
            echo "- Anthropic API check: \`passed\`"
            echo "- Claude Code Action session ID: \`${SESSION_ID:-<none>}\`"
            echo "- Claude structured output present: \`${STRUCTURED_OUTPUT:+yes}${STRUCTURED_OUTPUT:-no}\`"
          } >> "$GITHUB_STEP_SUMMARY"
