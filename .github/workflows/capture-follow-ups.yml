name: Capture Follow-ups

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to scan for FOLLOW-UP markers and create backlog issues'
        required: true
        type: number
      run_key:
        description: 'Optional existing run key to preserve correlation across wrapper workflows'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          PROVIDED_RUN_KEY: ${{ inputs.run_key }}
        run: |
          if [ -n "${PROVIDED_RUN_KEY:-}" ]; then
            run_key="$PROVIDED_RUN_KEY"
          else
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/follow-up-capture/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key"

      - name: Validate eligibility
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: follow-up-capture
          actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Follow-up capture — ineligible
          <!-- gpa:run-status:follow-up-capture:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

      - name: Check gate conditions
        id: gate
        if: steps.eligibility.outputs.eligible == 'true'
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: follow-up-capture
          issue_body: ${{ steps.eligibility.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trust_policy_path: config/trust-policy.yml

      - name: Post gate failure comment
        if: steps.gate.outputs.gate_passed != 'true' && steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Follow-up capture — gate not satisfied
          <!-- gpa:run-status:follow-up-capture:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :warning: Gate conditions not met |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet conditions:**
          $unmet_list

          To override, post a comment: \`GATE-WAIVER: <condition> — <reason>\` and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on gate not passed
        if: steps.gate.outputs.gate_passed != 'true' && steps.eligibility.outputs.eligible == 'true'
        shell: bash
        run: |
          echo "::error::Gate conditions not met for follow-up-capture"
          exit 1

      - name: Capture follow-ups
        if: steps.gate.outputs.gate_passed == 'true'
        id: capture
        uses: ./.github/actions/capture-follow-ups
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ github.actor }}

      - name: Query run history
        if: always()
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          ISSUES_CREATED: ${{ steps.capture.outputs.issues_created }}
          SKIPPED: ${{ steps.capture.outputs.skipped }}
          TOTAL_MARKERS: ${{ steps.capture.outputs.total_markers }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
        shell: bash
        run: |
          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Follow-up Capture Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Markers found | ${TOTAL_MARKERS:-n/a} |"
            echo "| Issues created | ${ISSUES_CREATED:-n/a} |"
            echo "| Skipped | ${SKIPPED:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- Review the created follow-up issues for accuracy"
            echo "- Proceed to closeout: \`orchestration-dispatch\` with \`requested_stage: closeout\`"
          } >> "$GITHUB_STEP_SUMMARY"
