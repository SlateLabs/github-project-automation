name: Run Design Stage

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      run_key:
        required: true
        type: string
      actor:
        required: true
        type: string
      orchestration_app_id:
        required: true
        type: string
    secrets:
      github_token:
        required: true
      openai_api_key:
        required: true
      anthropic_api_key:
        required: true
      orchestration_app_private_key:
        required: true

permissions:
  contents: read
  issues: write
  discussions: write

jobs:
  design:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate stage agent credentials
        env:
          OPENAI_API_KEY: ${{ secrets.openai_api_key }}
          ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
          ORCHESTRATION_APP_ID: ${{ inputs.orchestration_app_id }}
          ORCHESTRATION_APP_PRIVATE_KEY: ${{ secrets.orchestration_app_private_key }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Agent authoring requires OPENAI_API_KEY"; exit 1; }
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Agent review requires ANTHROPIC_API_KEY"; exit 1; }
          [ -n "$ORCHESTRATION_APP_ID" ] || { echo "::error::Agent review publishing requires orchestration_app_id"; exit 1; }
          [ -n "$ORCHESTRATION_APP_PRIVATE_KEY" ] || { echo "::error::Agent review publishing requires ORCHESTRATION_APP_PRIVATE_KEY"; exit 1; }

      - name: Create orchestration app token
        id: design-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.orchestration_app_id }}
          private-key: ${{ secrets.orchestration_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Scaffold design discussion (pre-gate)
        id: scaffold-discussion
        uses: ./.github/actions/scaffold-design-discussion
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.github_token }}
          run_key: ${{ inputs.run_key }}
          actor: ${{ inputs.actor }}

      - name: Load design discussion context
        id: design-context
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          DISCUSSION_NUMBER: ${{ steps.scaffold-discussion.outputs.discussion_number }}
        shell: bash
        run: |
          set -euo pipefail
          discussion_json=$(python3 scripts/github_discussion.py get --repo "$GITHUB_REPOSITORY" --number "$DISCUSSION_NUMBER")
          discussion_id=$(echo "$discussion_json" | jq -r '.id // empty')
          current_body=$(echo "$discussion_json" | jq -r '.body // ""')

          if [ -z "$discussion_id" ]; then
            echo "::error::Could not resolve discussion #$DISCUSSION_NUMBER for design hydration"
            exit 1
          fi

          {
            echo "discussion_id=$discussion_id"
            echo 'discussion_body<<EOF'
            printf '%s\n' "$current_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Codex design prompt
        id: design-author-prompt
        env:
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          DISCUSSION_BODY: ${{ steps.design-context.outputs.discussion_body }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/design-author-prompt.md"
          python3 scripts/build_orchestration_prompt.py design-author --output "$prompt_file"
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex author design proposal
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.design-author-prompt.outputs.prompt_file }}
          output-file: ${{ runner.temp }}/design-discussion.md
          openai-api-key: ${{ secrets.openai_api_key }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Normalize design open questions
        shell: bash
        run: |
          set -euo pipefail

          draft_file="$RUNNER_TEMP/design-discussion.md"
          [ -s "$draft_file" ] || { echo "::error::Codex did not produce a design discussion draft"; exit 1; }

          python3 scripts/normalize_design_open_questions.py < "$draft_file" > "$draft_file.normalized"
          mv "$draft_file.normalized" "$draft_file"

      - name: Apply Codex design draft
        env:
          GH_TOKEN: ${{ steps.design-app-token.outputs.token }}
          DISCUSSION_ID: ${{ steps.design-context.outputs.discussion_id }}
        shell: bash
        run: |
          set -euo pipefail

          draft_file="$RUNNER_TEMP/design-discussion.md"
          [ -s "$draft_file" ] || { echo "::error::Codex did not produce a design discussion draft"; exit 1; }
          python3 scripts/github_discussion.py update-body --discussion-id "$DISCUSSION_ID" --body-file "$draft_file"

      - name: Prepare Claude design review prompt
        id: design-review-prompt
        env:
          ISSUE_TITLE: ${{ inputs.issue_title }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          DISCUSSION_FILE: ${{ runner.temp }}/design-discussion.md
        shell: bash
        run: |
          set -euo pipefail
          prompt_file="$RUNNER_TEMP/design-review-prompt.md"
          python3 scripts/build_orchestration_prompt.py design-review --output "$prompt_file"
          {
            echo 'prompt<<EOF'
            cat "$prompt_file"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post automated design review comment (pre-gate)
        id: claude-design-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          github_token: ${{ secrets.github_token }}
          prompt: ${{ steps.design-review-prompt.outputs.prompt }}
          show_full_output: ${{ vars.ORCHESTRATION_CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          claude_args: >-
            --max-turns 1
          allowed_bots: "*"

      - name: Publish Claude design review comment (pre-gate)
        env:
          GH_TOKEN: ${{ steps.design-app-token.outputs.token }}
          DISCUSSION_NUMBER: ${{ steps.scaffold-discussion.outputs.discussion_number }}
          REVIEW_EXECUTION_FILE: ${{ steps.claude-design-review.outputs.execution_file }}
        shell: bash
        run: |
          set -euo pipefail
          discussion_json=$(python3 scripts/github_discussion.py get --repo "$GITHUB_REPOSITORY" --number "$DISCUSSION_NUMBER" --with-comments)
          discussion_id=$(echo "$discussion_json" | jq -r '.id // empty')
          existing_review=$(echo "$discussion_json" | jq -r '.comments.nodes[].body // ""' | grep -F 'gpa:design-review:auto' || true)
          if [ -n "$existing_review" ]; then
            echo "::notice::Automated design review comment already exists; skipping"
            exit 0
          fi

          if [ -z "${REVIEW_EXECUTION_FILE:-}" ] || [ ! -f "$REVIEW_EXECUTION_FILE" ]; then
            echo "::error::Claude design review did not produce an execution file"
            exit 1
          fi

          review_body=$(
            jq -rs -r '
              map(if type == "array" then .[] else . end)
              | map(select(.type == "result" and .subtype == "success"))[-1].result // ""
            ' "$REVIEW_EXECUTION_FILE"
          )
          review_body=$(printf '%s' "$review_body" | perl -0pe 's/\A```[a-zA-Z0-9_-]*\n//; s/\n```\s*\z/\n/s')
          if [ -z "$review_body" ]; then
            echo "::error::Claude design review did not produce a comment body"
            exit 1
          fi
          review_file="$RUNNER_TEMP/design-review-comment.md"
          printf '%s' "$review_body" > "$review_file"
          python3 scripts/github_discussion.py add-comment --discussion-id "$discussion_id" --body-file "$review_file"
