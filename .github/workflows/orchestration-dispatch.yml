name: Orchestration Dispatch

on:
  repository_dispatch:
    types: [orchestration-start]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      requested_stage:
        description: 'Target stage for the transition'
        required: true
        type: choice
        options:
          - kickoff
          - clarification
          - design
          - plan
          - execution
          - follow-up-capture
          - review
          - merge
          - closeout

permissions:
  contents: write
  issues: write
  discussions: write
  pull-requests: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize inputs
        id: normalize
        shell: bash
        env:
          TRIGGER: ${{ github.event_name }}
          # workflow_dispatch inputs
          WD_ISSUE_NUMBER: ${{ inputs.issue_number }}
          WD_REQUESTED_STAGE: ${{ inputs.requested_stage }}
          WD_ACTOR: ${{ github.actor }}
          # repository_dispatch client_payload (passed via env to avoid injection)
          RD_ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          RD_REQUESTED_STAGE: ${{ github.event.client_payload.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
          RD_ACTOR: ${{ github.event.client_payload.actor }}
          RD_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VALID_STAGES="kickoff clarification design plan execution follow-up-capture review merge closeout"

          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # --- Validate repository_dispatch payload ---
            errors=()

            # issue_number: must be a positive integer
            if [ -z "${RD_ISSUE_NUMBER:-}" ]; then
              errors+=("missing required field: issue_number")
            elif ! echo "$RD_ISSUE_NUMBER" | grep -qE '^[1-9][0-9]*$'; then
              errors+=("issue_number must be a positive integer, got: '${RD_ISSUE_NUMBER}'")
            fi

            # requested_stage: must be a known stage
            if [ -z "${RD_REQUESTED_STAGE:-}" ]; then
              errors+=("missing required field: requested_stage")
            else
              stage_valid="false"
              for s in $VALID_STAGES; do
                if [ "$s" = "$RD_REQUESTED_STAGE" ]; then
                  stage_valid="true"
                  break
                fi
              done
              if [ "$stage_valid" = "false" ]; then
                errors+=("unknown requested_stage: '${RD_REQUESTED_STAGE}'")
              fi
            fi

            # run_key: must match <owner>/<repo>/<number>/<stage>/<timestamp>
            if [ -z "${RD_RUN_KEY:-}" ]; then
              errors+=("missing required field: run_key")
            elif ! echo "$RD_RUN_KEY" | grep -qE '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/[0-9]+/[A-Za-z0-9_-]+/[0-9]+$'; then
              errors+=("run_key does not match canonical format '<owner>/<repo>/<number>/<stage>/<timestamp>', got: '${RD_RUN_KEY}'")
            fi

            # actor: must be non-empty
            if [ -z "${RD_ACTOR:-}" ]; then
              errors+=("missing required field: actor")
            fi

            # timestamp: must be non-empty
            if [ -z "${RD_TIMESTAMP:-}" ]; then
              errors+=("missing required field: timestamp")
            fi

            if [ ${#errors[@]} -gt 0 ]; then
              error_msg="repository_dispatch payload validation failed:"
              for e in "${errors[@]}"; do
                error_msg="${error_msg}\n- ${e}"
              done
              echo "::error::${error_msg}"

              # Post diagnostic comment if issue_number is parseable
              if echo "${RD_ISSUE_NUMBER:-}" | grep -qE '^[1-9][0-9]*$'; then
                diagnostic="### Orchestration run â€” payload validation failed\n\n"
                diagnostic+="The \`repository_dispatch\` payload for \`orchestration-start\` failed validation:\n\n"
                for e in "${errors[@]}"; do
                  diagnostic+="- ${e}\n"
                done
                diagnostic+="\nExpected payload: \`{ issue_number, requested_stage, run_key, actor, timestamp }\`"
                echo -e "$diagnostic" | gh issue comment "${RD_ISSUE_NUMBER}" --body-file -
              fi

              exit 1
            fi

            # Normalized outputs for repository_dispatch
            echo "issue_number=${RD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${RD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${RD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=repository_dispatch" >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from repository_dispatch (actor: ${RD_ACTOR}, issue: ${RD_ISSUE_NUMBER}, stage: ${RD_REQUESTED_STAGE})"
          else
            # --- workflow_dispatch: pass through existing inputs ---
            echo "issue_number=${WD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${WD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${WD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from workflow_dispatch (actor: ${WD_ACTOR}, issue: ${WD_ISSUE_NUMBER}, stage: ${WD_REQUESTED_STAGE})"
          fi

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          TRIGGER: ${{ steps.normalize.outputs.trigger }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ steps.normalize.outputs.issue_number }}
          STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
        run: |
          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # Preserve gateway-provided run key
            run_key="$RD_RUN_KEY"
            # Extract timestamp from run key (last segment) for logging
            timestamp=$(echo "$run_key" | rev | cut -d/ -f1 | rev)
          else
            # Generate fresh run key for manual trigger
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/${STAGE}/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key (source: $TRIGGER)"

      - name: Check for recent duplicate run
        id: dedup
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # Â§Idempotency â€” Manual path dedup obligations, rule 1: recent-run check
          # Scan the last 10 issue comments for a successful orchestration run comment
          # with the same <repo>/<issue-number>/<requested-stage> prefix completed
          # within the dedup window.
          DEDUP_WINDOW_SECONDS=60
          run_prefix="${REPO_NAME}/${ISSUE_NUMBER}/${REQUESTED_STAGE}/"
          current_epoch=$(date +%s)

          recent_comments=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
            --jq '[.comments | sort_by(.createdAt) | reverse | .[:10] | .[] | select(.body | test("stage transition accepted")) | .body]' 2>/dev/null || echo '[]')

          duplicate="false"

          # Check each recent success comment for a matching run key prefix
          comment_count=$(echo "$recent_comments" | jq 'length')
          for (( i=0; i<comment_count; i++ )); do
            comment_body=$(echo "$recent_comments" | jq -r ".[$i]")
            # Extract run key from the comment (structured format: repo/issue/stage/timestamp)
            found_key=$(echo "$comment_body" | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_-]+/[0-9]+/${REQUESTED_STAGE}/[0-9]+" | head -1 || true)
            if [ -n "$found_key" ]; then
              # Extract timestamp from run key (last segment, milliseconds)
              key_timestamp_ms=$(echo "$found_key" | rev | cut -d/ -f1 | rev)
              key_timestamp_s=$((key_timestamp_ms / 1000))
              elapsed=$((current_epoch - key_timestamp_s))
              if [ "$elapsed" -lt "$DEDUP_WINDOW_SECONDS" ] && [ "$elapsed" -ge 0 ]; then
                duplicate="true"
                break
              fi
            fi
          done

          # Check for GATE-WAIVER: dedup to force past the dedup check
          # Trust-scoped: only accept waivers from actors in trusted_users (Â§4 rule 5)
          if [ "$duplicate" = "true" ]; then
            trusted_users_list=""
            trust_policy="config/trust-policy.yml"
            if [ -f "$trust_policy" ]; then
              trusted_users_list=$(grep -A 100 '^trusted_users:' "$trust_policy" \
                | grep -E '^\s*-\s+' | sed 's/.*-\s*//' | tr -d ' ' || true)
            fi

            waiver_found="false"
            waiver_comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
              --jq '.comments[] | {author: .author.login, body: .body}' 2>/dev/null || true)
            while IFS= read -r comment_line; do
              [ -z "$comment_line" ] && continue
              comment_author=$(echo "$comment_line" | jq -r '.author // ""')
              comment_body=$(echo "$comment_line" | jq -r '.body // ""')
              # Only accept waivers from trusted users
              author_trusted="false"
              if [ -n "$trusted_users_list" ]; then
                while IFS= read -r tuser; do
                  if [ "$tuser" = "$comment_author" ]; then
                    author_trusted="true"
                    break
                  fi
                done <<< "$trusted_users_list"
              fi
              if [ "$author_trusted" = "true" ] && echo "$comment_body" | grep -qi 'GATE-WAIVER:.*dedup'; then
                waiver_found="true"
                echo "::notice::Dedup window active but trusted GATE-WAIVER: dedup found from @$comment_author â€” proceeding"
                break
              fi
            done < <(echo "$waiver_comments_json" | jq -c '.' 2>/dev/null || true)

            if [ "$waiver_found" = "true" ]; then
              duplicate="false"
            fi
          fi

          echo "duplicate=$duplicate" >> "$GITHUB_OUTPUT"

          if [ "$duplicate" = "true" ]; then
            echo "::warning::Skipping: a recent run for this issue/stage completed within the ${DEDUP_WINDOW_SECONDS}s dedup window"
            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” skipped (duplicate)
          <!-- gpa:run-status:$REQUESTED_STAGE:skipped:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :fast_forward: Skipped â€” recent run detected |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          A successful run for this issue/stage completed within the last ${DEDUP_WINDOW_SECONDS}s.
          Re-trigger after the dedup window expires, or post \`GATE-WAIVER: dedup â€” <reason>\` to force.
          COMMENT_EOF
            )"
          fi

      - name: Exit on duplicate
        if: steps.dedup.outputs.duplicate == 'true'
        shell: bash
        run: |
          echo "::notice::Exiting cleanly â€” duplicate run detected within dedup window"
          exit 0

      - name: Validate eligibility
        if: steps.dedup.outputs.duplicate != 'true'
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          requested_stage: ${{ steps.normalize.outputs.requested_stage }}
          actor: ${{ steps.normalize.outputs.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” ineligible
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

      # --- Pre-gate stage actions ---
      # For the design stage, scaffold the discussion BEFORE the gate check.
      # The gate validates discussion quality (headings, open questions, review)
      # against the existing or just-created discussion.
      - name: Scaffold design discussion (pre-gate)
        if: steps.eligibility.outputs.eligible == 'true' && steps.normalize.outputs.requested_stage == 'design'
        id: scaffold-discussion
        uses: ./.github/actions/scaffold-design-discussion
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ steps.normalize.outputs.actor }}

      # For the plan stage, scaffold the plan comment BEFORE the gate check.
      # The gate validates plan structure (headings, checklists, review expectations)
      # against the existing or just-created plan comment.
      - name: Scaffold implementation plan (pre-gate)
        if: steps.eligibility.outputs.eligible == 'true' && steps.normalize.outputs.requested_stage == 'plan'
        id: scaffold-plan
        uses: ./.github/actions/scaffold-impl-plan
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ steps.normalize.outputs.actor }}

      # For the execution stage, scaffold branch + draft PR BEFORE the gate check.
      # The gate validates execution artifacts (branch exists, PR exists, required headings)
      # against the existing or just-created PR.
      - name: Scaffold execution bootstrap (pre-gate)
        if: steps.eligibility.outputs.eligible == 'true' && steps.normalize.outputs.requested_stage == 'execution'
        id: scaffold-execution
        uses: ./.github/actions/scaffold-execution
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ steps.normalize.outputs.actor }}

      # For the closeout stage, enforce pre-scaffold prerequisites BEFORE
      # scaffolding. This matches the standalone scaffold-closeout.yml sequence:
      # pre-scaffold gate (merged PR, branch deleted, follow-ups) â†’ scaffold â†’
      # full gate (content checks). Without this, the orchestration path could
      # post a closeout retrospective on an issue that hasn't met prerequisites.
      - name: Pre-scaffold gate check (closeout)
        if: steps.eligibility.outputs.eligible == 'true' && steps.normalize.outputs.requested_stage == 'closeout'
        id: closeout-pre-gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          requested_stage: closeout
          issue_body: ${{ steps.eligibility.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_mode: pre-scaffold

      - name: Post closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.closeout-pre-gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- :x: \(.)"' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- :fast_forward: \(.)"' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” closeout pre-scaffold gate failed
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Prerequisites not met â€” scaffold not posted |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet prerequisites:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          Resolve the unmet prerequisites and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
        shell: bash
        run: |
          echo "::error::Closeout pre-scaffold gate failed. Unmet prerequisites: $UNMET"
          exit 1

      - name: Scaffold closeout retrospective (pre-gate)
        if: steps.eligibility.outputs.eligible == 'true' && steps.normalize.outputs.requested_stage == 'closeout' && steps.closeout-pre-gate.outputs.gate_passed != 'false'
        id: scaffold-closeout
        uses: ./.github/actions/scaffold-closeout
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ steps.normalize.outputs.actor }}

      # For the follow-up-capture stage, run the capture action AFTER the gate
      # check passes (unlike design/plan/execution which scaffold BEFORE the gate).
      # The gate validates that markers exist and execution is complete; the capture
      # action then creates the actual backlog issues.

      - name: Check gate conditions
        id: gate
        if: steps.eligibility.outputs.eligible == 'true'
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          requested_stage: ${{ steps.normalize.outputs.requested_stage }}
          issue_body: ${{ steps.eligibility.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trust_policy_path: config/trust-policy.yml

      - name: Post gate failure comment
        if: steps.gate.outputs.gate_passed != 'true' && steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” gate not satisfied
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :warning: Gate conditions not met |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet conditions:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          To override, post a comment: \`GATE-WAIVER: <condition> â€” <reason>\` and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on gate not passed
        if: steps.gate.outputs.gate_passed != 'true' && steps.eligibility.outputs.eligible == 'true'
        env:
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
        shell: bash
        run: |
          echo "::error::Gate conditions not met for stage '$REQUESTED_STAGE'"
          exit 1

      - name: Verify current state unchanged
        id: state-check
        if: steps.gate.outputs.gate_passed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
        run: |
          # Â§Idempotency â€” Manual path dedup obligations, rule 2: current-state check
          # Verify the issue hasn't changed since the run started (still open, no
          # do-not-automate label added). Posts a mismatch comment per contract.
          # Slice 4 MUST extend this with check-before-act for each non-idempotent
          # operation it adds (branch creation, PR opening, etc.).
          issue_json=$(gh issue view "$ISSUE_NUMBER" --json state,labels 2>/dev/null || echo '{}')
          issue_state=$(echo "$issue_json" | jq -r '.state // "UNKNOWN"')
          has_block_label=$(echo "$issue_json" | jq -r '.labels[]? | select(.name == "do-not-automate") | .name' || true)

          mismatch=""
          if [ "$issue_state" = "CLOSED" ]; then
            mismatch="Issue #$ISSUE_NUMBER was closed between eligibility check and gate pass"
          elif [ -n "$has_block_label" ]; then
            mismatch="Issue #$ISSUE_NUMBER had do-not-automate label added between eligibility check and gate pass"
          fi

          if [ -n "$mismatch" ]; then
            echo "::error::$mismatch"
            # Post status mismatch comment per Â§Idempotency current-state checks contract
            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” superseded (state mismatch)
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :stop_sign: Superseded â€” state changed during run |
          | **Reason** | $mismatch |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
            )"
            echo "state_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "state_valid=true" >> "$GITHUB_OUTPUT"

      - name: Post success comment
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          WAIVED: ${{ steps.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "")
          waived_section=""
          if [ -n "$waived_list" ]; then
            waived_section="
          **Waived conditions:**
          $waived_list"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run â€” stage transition accepted
          <!-- gpa:run-status:$REQUESTED_STAGE:completed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :white_check_mark: Eligible and gate passed |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          $waived_section
          COMMENT_EOF
          )"

      # Post-gate action: capture follow-ups after gate confirms markers exist
      # and execution is complete. Unlike pre-gate scaffolds, this runs AFTER
      # the gate passes because it creates external artifacts (new issues).
      - name: Capture follow-ups (post-gate)
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && steps.normalize.outputs.requested_stage == 'follow-up-capture'
        id: capture-follow-ups
        uses: ./.github/actions/capture-follow-ups
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ steps.normalize.outputs.actor }}

      - name: Query run history
        if: always()
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          GATE_PASSED: ${{ steps.gate.outputs.gate_passed }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          REPO: ${{ github.repository }}
          TRIGGER: ${{ steps.normalize.outputs.trigger }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
        shell: bash
        run: |
          # Determine next-step hint based on the requested stage
          next_step=""
          case "$REQUESTED_STAGE" in
            design)
              next_step="Fill in the design discussion, resolve open questions, then re-trigger with \`requested_stage: design\`"
              ;;
            plan)
              next_step="Fill in the implementation plan with substantive content, then re-trigger with \`requested_stage: plan\`"
              ;;
            execution)
              next_step="Implement the feature, fill in the PR, mark ready for review, then re-trigger with \`requested_stage: execution\`"
              ;;
            follow-up-capture)
              next_step="Review created follow-up issues, then proceed to closeout with \`requested_stage: closeout\`"
              ;;
            closeout)
              next_step="Complete the retrospective sections and exit checklist, then close the issue"
              ;;
            *)
              next_step="Check issue [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) for current status"
              ;;
          esac

          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Orchestration Dispatch Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Stage | \`$REQUESTED_STAGE\` |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Gate passed | ${GATE_PASSED:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- $next_step"
          } >> "$GITHUB_STEP_SUMMARY"
