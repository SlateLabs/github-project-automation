name: Orchestration Dispatch
run-name: >-
  ${{ github.event_name == 'repository_dispatch'
      && format('{0} (#{1}) - {2}',
                github.event.client_payload.issue_title || 'Issue',
                github.event.client_payload.issue_number,
                github.event.client_payload.requested_stage)
      || format('#{0} - {1}', github.event.inputs.issue_number, github.event.inputs.requested_stage) }}

on:
  repository_dispatch:
    types: [orchestration-start]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      requested_stage:
        description: 'Target stage for the transition'
        required: true
        type: choice
        options:
          - kickoff
          - clarification
          - design
          - plan
          - execution
          - deploy-review
          - review-intake
          - feedback-implementation
          - redeploy-review
          - post-merge-verify
          - follow-up-capture
          - review
          - merge
          - closeout

permissions:
  contents: write
  issues: write
  discussions: write
  pull-requests: write

# ──────────────────────────────────────────────────────────────────────
# Job graph:
#
#   intake
#     │
#   gate
#     │
#   handoff
#     │
#   summary  (always runs)
# ──────────────────────────────────────────────────────────────────────

jobs:
  # ── intake ──────────────────────────────────────────────────────────
  # Parse the incoming request and generate a run key.
  intake:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.normalize.outputs.issue_number }}
      requested_stage: ${{ steps.normalize.outputs.requested_stage }}
      feedback_instructions: ${{ steps.normalize.outputs.feedback_instructions }}
      source_command: ${{ steps.normalize.outputs.source_command }}
      source_comment_id: ${{ steps.normalize.outputs.source_comment_id }}
      actor: ${{ steps.normalize.outputs.actor }}
      trigger: ${{ steps.normalize.outputs.trigger }}
      project_item_id: ${{ steps.project-context.outputs.project_item_id }}
      run_key: ${{ steps.run-key.outputs.run_key }}
      timestamp: ${{ steps.run-key.outputs.timestamp }}
      duplicate: ${{ steps.dedup.outputs.duplicate }}
      eligible: ${{ steps.eligibility.outputs.eligible }}
      reason: ${{ steps.eligibility.outputs.reason }}
      issue_title: ${{ steps.eligibility.outputs.issue_title }}
      issue_body: ${{ steps.eligibility.outputs.issue_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize inputs
        id: normalize
        shell: bash
        env:
          TRIGGER: ${{ github.event_name }}
          WD_ISSUE_NUMBER: ${{ inputs.issue_number }}
          WD_REQUESTED_STAGE: ${{ inputs.requested_stage }}
          WD_ACTOR: ${{ github.actor }}
          RD_ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          RD_REQUESTED_STAGE: ${{ github.event.client_payload.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
          RD_ACTOR: ${{ github.event.client_payload.actor }}
          RD_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
          RD_PROJECT_ITEM_ID: ${{ github.event.client_payload.project_item_id }}
          RD_FEEDBACK_INSTRUCTIONS: ${{ github.event.client_payload.feedback_instructions }}
          RD_SOURCE_COMMAND: ${{ github.event.client_payload.source_command }}
          RD_SOURCE_COMMENT_ID: ${{ github.event.client_payload.source_comment_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          VALID_STAGES="kickoff clarification design plan execution deploy-review review-intake feedback-implementation redeploy-review merge post-merge-verify follow-up-capture review closeout"

          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # --- Validate repository_dispatch payload ---
            errors=()

            # issue_number: must be a positive integer
            if [ -z "${RD_ISSUE_NUMBER:-}" ]; then
              errors+=("missing required field: issue_number")
            elif ! echo "$RD_ISSUE_NUMBER" | grep -qE '^[1-9][0-9]*$'; then
              errors+=("issue_number must be a positive integer, got: '${RD_ISSUE_NUMBER}'")
            fi

            # requested_stage: must be a known stage
            if [ -z "${RD_REQUESTED_STAGE:-}" ]; then
              errors+=("missing required field: requested_stage")
            else
              stage_valid="false"
              for s in $VALID_STAGES; do
                if [ "$s" = "$RD_REQUESTED_STAGE" ]; then
                  stage_valid="true"
                  break
                fi
              done
              if [ "$stage_valid" = "false" ]; then
                errors+=("unknown requested_stage: '${RD_REQUESTED_STAGE}'")
              fi
            fi

            # run_key: must match <owner>/<repo>/<number>/<stage>/<timestamp>
            # AND parsed components must be consistent with the other payload fields
            if [ -z "${RD_RUN_KEY:-}" ]; then
              errors+=("missing required field: run_key")
            elif ! echo "$RD_RUN_KEY" | grep -qE '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/[0-9]+/[A-Za-z0-9_-]+/[0-9]+$'; then
              errors+=("run_key does not match canonical format '<owner>/<repo>/<number>/<stage>/<timestamp>', got: '${RD_RUN_KEY}'")
            else
              # Parse run_key and validate consistency with payload fields
              rk_owner=$(echo "$RD_RUN_KEY" | cut -d/ -f1)
              rk_repo=$(echo "$RD_RUN_KEY" | cut -d/ -f2)
              rk_issue=$(echo "$RD_RUN_KEY" | cut -d/ -f3)
              rk_stage=$(echo "$RD_RUN_KEY" | cut -d/ -f4)
              rk_timestamp=$(echo "$RD_RUN_KEY" | cut -d/ -f5)

              if [ -n "${CURRENT_REPO:-}" ] && [ "${rk_owner}/${rk_repo}" != "$CURRENT_REPO" ]; then
                errors+=("run_key repo '${rk_owner}/${rk_repo}' does not match current repo '${CURRENT_REPO}'")
              fi
              if [ -n "${RD_ISSUE_NUMBER:-}" ] && [ "$rk_issue" != "$RD_ISSUE_NUMBER" ]; then
                errors+=("run_key issue_number '${rk_issue}' does not match client_payload.issue_number '${RD_ISSUE_NUMBER}'")
              fi
              if [ -n "${RD_REQUESTED_STAGE:-}" ] && [ "$rk_stage" != "$RD_REQUESTED_STAGE" ]; then
                errors+=("run_key stage '${rk_stage}' does not match client_payload.requested_stage '${RD_REQUESTED_STAGE}'")
              fi
              if [ -n "${RD_TIMESTAMP:-}" ] && [ "$rk_timestamp" != "$RD_TIMESTAMP" ]; then
                errors+=("run_key timestamp '${rk_timestamp}' does not match client_payload.timestamp '${RD_TIMESTAMP}'")
              fi
            fi

            # actor: must be non-empty
            if [ -z "${RD_ACTOR:-}" ]; then
              errors+=("missing required field: actor")
            fi

            # timestamp: must be non-empty
            if [ -z "${RD_TIMESTAMP:-}" ]; then
              errors+=("missing required field: timestamp")
            fi

            # operator command provenance fields (optional but must be coherent when provided)
            has_source_command="false"
            has_source_comment_id="false"
            if [ -n "${RD_SOURCE_COMMAND:-}" ]; then
              has_source_command="true"
              case "$RD_SOURCE_COMMAND" in
                feedback|approve) ;;
                *)
                  errors+=("source_command must be one of: feedback, approve (got '${RD_SOURCE_COMMAND}')")
                  ;;
              esac
            fi
            if [ -n "${RD_SOURCE_COMMENT_ID:-}" ]; then
              has_source_comment_id="true"
              if ! echo "$RD_SOURCE_COMMENT_ID" | grep -qE '^[1-9][0-9]*$'; then
                errors+=("source_comment_id must be a positive integer, got: '${RD_SOURCE_COMMENT_ID}'")
              fi
            fi
            if [ "$has_source_command" = "true" ] && [ "$has_source_comment_id" = "false" ]; then
              errors+=("source_comment_id is required when source_command is provided")
            fi
            if [ "$has_source_command" = "false" ] && [ "$has_source_comment_id" = "true" ]; then
              errors+=("source_command is required when source_comment_id is provided")
            fi
            if [ "$RD_SOURCE_COMMAND" = "feedback" ]; then
              if [ "$RD_REQUESTED_STAGE" != "feedback-implementation" ]; then
                errors+=("source_command 'feedback' requires requested_stage 'feedback-implementation'")
              fi
              if [ -z "${RD_FEEDBACK_INSTRUCTIONS:-}" ]; then
                errors+=("feedback_instructions is required when source_command is 'feedback'")
              fi
            fi
            if [ "$RD_SOURCE_COMMAND" = "approve" ] && [ "$RD_REQUESTED_STAGE" != "merge" ]; then
              errors+=("source_command 'approve' requires requested_stage 'merge'")
            fi
            if [ -n "${RD_FEEDBACK_INSTRUCTIONS:-}" ] && [ "${RD_SOURCE_COMMAND:-}" != "feedback" ]; then
              errors+=("feedback_instructions may only be set when source_command is 'feedback'")
            fi

            if [ ${#errors[@]} -gt 0 ]; then
              error_msg="repository_dispatch payload validation failed:"
              for e in "${errors[@]}"; do
                error_msg="${error_msg}\n- ${e}"
              done
              echo "::error::${error_msg}"

              # Post diagnostic comment if issue_number is parseable
              if echo "${RD_ISSUE_NUMBER:-}" | grep -qE '^[1-9][0-9]*$'; then
                diagnostic="### Orchestration run — payload validation failed\n\n"
                diagnostic+="The \`repository_dispatch\` payload for \`orchestration-start\` failed validation:\n\n"
                for e in "${errors[@]}"; do
                  diagnostic+="- ${e}\n"
                done
                diagnostic+="\nExpected payload: \`{ issue_number, requested_stage, run_key, actor, timestamp }\`"
                diagnostic+="\nOptional closed-loop field: \`project_item_id\`"
                diagnostic+="\nOptional operator-command fields (must be coherent when present): \`source_command\`, \`source_comment_id\`, \`feedback_instructions\`"
                echo -e "$diagnostic" | gh issue comment "${RD_ISSUE_NUMBER}" --body-file -
              fi

              exit 1
            fi

            # Normalized outputs for repository_dispatch
            echo "issue_number=${RD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${RD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${RD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=repository_dispatch" >> "$GITHUB_OUTPUT"
            echo "project_item_id=${RD_PROJECT_ITEM_ID}" >> "$GITHUB_OUTPUT"
            echo "source_command=${RD_SOURCE_COMMAND}" >> "$GITHUB_OUTPUT"
            echo "source_comment_id=${RD_SOURCE_COMMENT_ID}" >> "$GITHUB_OUTPUT"
            {
              echo "feedback_instructions<<EOF"
              printf '%s\n' "${RD_FEEDBACK_INSTRUCTIONS}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from repository_dispatch (actor: ${RD_ACTOR}, issue: ${RD_ISSUE_NUMBER}, stage: ${RD_REQUESTED_STAGE})"
          else
            # --- workflow_dispatch: pass through existing inputs ---
            echo "issue_number=${WD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${WD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${WD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "project_item_id=" >> "$GITHUB_OUTPUT"
            echo "source_command=" >> "$GITHUB_OUTPUT"
            echo "source_comment_id=" >> "$GITHUB_OUTPUT"
            echo "feedback_instructions=" >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from workflow_dispatch (actor: ${WD_ACTOR}, issue: ${WD_ISSUE_NUMBER}, stage: ${WD_REQUESTED_STAGE})"
          fi

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          TRIGGER: ${{ steps.normalize.outputs.trigger }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ steps.normalize.outputs.issue_number }}
          STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
        run: |
          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # Preserve gateway-provided run key
            run_key="$RD_RUN_KEY"
            # Extract timestamp from run key (last segment) for logging
            timestamp=$(echo "$run_key" | rev | cut -d/ -f1 | rev)
          else
            # Generate fresh run key for manual trigger
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/${STAGE}/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key (source: $TRIGGER)"

      - name: Create orchestration app token (project item recovery)
        if: steps.normalize.outputs.project_item_id == '' && vars.ORCHESTRATION_APP_ID != ''
        id: intake-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-organization-projects: write

      - name: Recover project item context
        id: project-context
        shell: bash
        env:
          PROVIDED_PROJECT_ITEM_ID: ${{ steps.normalize.outputs.project_item_id }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          GH_TOKEN: ${{ steps.intake-app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [ -n "$PROVIDED_PROJECT_ITEM_ID" ]; then
            echo "project_item_id=$PROVIDED_PROJECT_ITEM_ID" >> "$GITHUB_OUTPUT"
            echo "::notice::Using provided project_item_id from event payload"
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "project_item_id=" >> "$GITHUB_OUTPUT"
            echo "::notice::No GitHub App token available for project item recovery"
            exit 0
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          query=$(cat <<'GRAPHQL'
          query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              issue(number: $number) {
                projectItems(first: 20) {
                  nodes {
                    id
                    project {
                      ... on ProjectV2 {
                        id
                        title
                        closed
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          payload=$(gh api graphql -f query="$query" -f owner="$owner" -f repo="$repo" -F number="$ISSUE_NUMBER")
          recovered_id=$(echo "$payload" | jq -r '
            .data.repository.issue.projectItems.nodes
            | map(select(.project.closed == false))
            | (map(select(.project.title == "Workflow Orchestration")) + .)
            | map(.id)
            | .[0] // ""
          ')

          echo "project_item_id=$recovered_id" >> "$GITHUB_OUTPUT"
          if [ -n "$recovered_id" ]; then
            echo "::notice::Recovered project_item_id from project membership: $recovered_id"
          else
            echo "::notice::Issue is not linked to an open project item; closed-loop sync remains disabled"
          fi

      - name: Check for recent duplicate run
        id: dedup
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # §Idempotency — Manual path dedup obligations, rule 1: recent-run check
          # Scan the last 10 issue comments for a successful orchestration run comment
          # with the same <repo>/<issue-number>/<requested-stage> prefix completed
          # within the dedup window.
          DEDUP_WINDOW_SECONDS=60
          run_prefix="${REPO_NAME}/${ISSUE_NUMBER}/${REQUESTED_STAGE}/"
          current_epoch=$(date +%s)

          recent_comments=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
            --jq '[.comments | sort_by(.createdAt) | reverse | .[:10] | .[] | select(.body | test("stage transition accepted")) | .body]' 2>/dev/null || echo '[]')

          duplicate="false"

          # Check each recent success comment for a matching run key prefix
          comment_count=$(echo "$recent_comments" | jq 'length')
          for (( i=0; i<comment_count; i++ )); do
            comment_body=$(echo "$recent_comments" | jq -r ".[$i]")
            # Extract run key from the comment (structured format: repo/issue/stage/timestamp)
            found_key=$(echo "$comment_body" | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_-]+/[0-9]+/${REQUESTED_STAGE}/[0-9]+" | head -1 || true)
            if [ -n "$found_key" ]; then
              # Extract timestamp from run key (last segment, milliseconds)
              key_timestamp_ms=$(echo "$found_key" | rev | cut -d/ -f1 | rev)
              key_timestamp_s=$((key_timestamp_ms / 1000))
              elapsed=$((current_epoch - key_timestamp_s))
              if [ "$elapsed" -lt "$DEDUP_WINDOW_SECONDS" ] && [ "$elapsed" -ge 0 ]; then
                duplicate="true"
                break
              fi
            fi
          done

          # Check for GATE-WAIVER: dedup to force past the dedup check
          # Trust-scoped: only accept waivers from actors in trusted_users (§4 rule 5)
          if [ "$duplicate" = "true" ]; then
            trusted_users_list=""
            trust_policy="config/trust-policy.yml"
            if [ -f "$trust_policy" ]; then
              trusted_users_list=$(grep -A 100 '^trusted_users:' "$trust_policy" \
                | grep -E '^\s*-\s+' | sed 's/.*-\s*//' | tr -d ' ' || true)
            fi

            waiver_found="false"
            waiver_comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
              --jq '.comments[] | {author: .author.login, body: .body}' 2>/dev/null || true)
            while IFS= read -r comment_line; do
              [ -z "$comment_line" ] && continue
              comment_author=$(echo "$comment_line" | jq -r '.author // ""')
              comment_body=$(echo "$comment_line" | jq -r '.body // ""')
              # Only accept waivers from trusted users
              author_trusted="false"
              if [ -n "$trusted_users_list" ]; then
                while IFS= read -r tuser; do
                  if [ "$tuser" = "$comment_author" ]; then
                    author_trusted="true"
                    break
                  fi
                done <<< "$trusted_users_list"
              fi
              if [ "$author_trusted" = "true" ] && echo "$comment_body" | grep -qi 'GATE-WAIVER:.*dedup'; then
                waiver_found="true"
                echo "::notice::Dedup window active but trusted GATE-WAIVER: dedup found from @$comment_author — proceeding"
                break
              fi
            done < <(echo "$waiver_comments_json" | jq -c '.' 2>/dev/null || true)

            if [ "$waiver_found" = "true" ]; then
              duplicate="false"
            fi
          fi

          echo "duplicate=$duplicate" >> "$GITHUB_OUTPUT"

          if [ "$duplicate" = "true" ]; then
            echo "::warning::Skipping: a recent run for this issue/stage completed within the ${DEDUP_WINDOW_SECONDS}s dedup window"
            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — skipped (duplicate)
          <!-- gpa:run-status:$REQUESTED_STAGE:skipped:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :fast_forward: Skipped — recent run detected |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          A successful run for this issue/stage completed within the last ${DEDUP_WINDOW_SECONDS}s.
          Re-trigger after the dedup window expires, or post \`GATE-WAIVER: dedup — <reason>\` to force.
          COMMENT_EOF
            )"
          fi

      - name: Validate eligibility
        if: steps.dedup.outputs.duplicate != 'true'
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          requested_stage: ${{ steps.normalize.outputs.requested_stage }}
          actor: ${{ steps.normalize.outputs.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — ineligible
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

  # ── gate ────────────────────────────────────────────────────────────
  # Create artifacts, evaluate gates, and record stage advancement.
  gate:
    needs: intake
    if: needs.intake.outputs.duplicate != 'true'
    runs-on: ubuntu-latest
    outputs:
      gate_passed: ${{ steps.gate.outputs.gate_passed }}
      unmet_conditions: ${{ steps.gate.outputs.unmet_conditions }}
      waived_conditions: ${{ steps.gate.outputs.waived_conditions }}
      state_valid: ${{ steps.state-check.outputs.state_valid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate stage agent credentials
        if: needs.intake.outputs.requested_stage == 'design' || needs.intake.outputs.requested_stage == 'plan'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ORCHESTRATION_APP_ID: ${{ vars.ORCHESTRATION_APP_ID }}
          ORCHESTRATION_APP_PRIVATE_KEY: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Agent authoring requires secrets.OPENAI_API_KEY"; exit 1; }
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Agent review requires secrets.ANTHROPIC_API_KEY"; exit 1; }
          [ -n "$ORCHESTRATION_APP_ID" ] || { echo "::error::Agent review publishing requires vars.ORCHESTRATION_APP_ID"; exit 1; }
          [ -n "$ORCHESTRATION_APP_PRIVATE_KEY" ] || { echo "::error::Agent review publishing requires secrets.ORCHESTRATION_APP_PRIVATE_KEY"; exit 1; }

      - name: Create orchestration app token (design review)
        if: needs.intake.outputs.requested_stage == 'design' && vars.ORCHESTRATION_APP_ID != ''
        id: design-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Scaffold clarification issue body (pre-gate)
        if: needs.intake.outputs.requested_stage == 'clarification'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
        shell: bash
        run: |
          set -euo pipefail

          body="$ISSUE_BODY"
          changed="false"

          if ! printf '%s\n' "$body" | grep -qE '^#{1,2}\s+Scope'; then
            body="${body}"$'\n\n'"## Scope"$'\n'"- Initial scope to be refined by orchestration."$'\n'
            changed="true"
          fi

          if printf '%s\n' "$body" | grep -qE '^#{1,2}\s+Open Questions'; then
            rewritten_body="$(printf '%s' "$body" | python3 scripts/defer_open_questions.py)"
            if [ "$rewritten_body" != "$body" ]; then
              body="$rewritten_body"
              changed="true"
            fi
          fi

          if [ "$changed" = "true" ]; then
            tmp_body=$(mktemp)
            printf '%s\n' "$body" > "$tmp_body"
            gh issue edit "$ISSUE_NUMBER" --body-file "$tmp_body"
            echo "::notice::Clarification scaffold updated issue body (headings and deferred open questions)"
          else
            echo "::notice::Issue body already satisfies clarification scaffold defaults"
          fi

      # For the design stage, scaffold the discussion BEFORE the gate check.
      # The gate validates discussion quality (headings, open questions, review)
      # against the existing or just-created discussion.
      - name: Scaffold design discussion (pre-gate)
        if: needs.intake.outputs.requested_stage == 'design'
        id: scaffold-discussion
        uses: ./.github/actions/scaffold-design-discussion
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

      - name: Load design discussion context
        if: needs.intake.outputs.requested_stage == 'design'
        id: design-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_NUMBER: ${{ steps.scaffold-discussion.outputs.discussion_number }}
        shell: bash
        run: |
          set -euo pipefail

          discussion_query=$(cat <<'GRAPHQL'
          query($owner: String!, $name: String!, $number: Int!) {
            repository(owner: $owner, name: $name) {
              discussion(number: $number) {
                id
                body
              }
            }
          }
          GRAPHQL
          )

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          discussion_json=$(gh api graphql -f query="$discussion_query" -f owner="$owner" -f name="$repo" -F number="$DISCUSSION_NUMBER")
          discussion_id=$(echo "$discussion_json" | jq -r '.data.repository.discussion.id // empty')
          current_body=$(echo "$discussion_json" | jq -r '.data.repository.discussion.body // ""')

          if [ -z "$discussion_id" ]; then
            echo "::error::Could not resolve discussion #$DISCUSSION_NUMBER for design hydration"
            exit 1
          fi

          {
            echo "discussion_id=$discussion_id"
            echo 'discussion_body<<EOF'
            printf '%s\n' "$current_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Codex design prompt
        if: needs.intake.outputs.requested_stage == 'design'
        id: design-author-prompt
        env:
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          DISCUSSION_BODY: ${{ steps.design-context.outputs.discussion_body }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/design-author-prompt.md"
          cat > "$prompt_file" <<EOF
          You are Codex acting as the design author for a GitHub workflow orchestration system.

          Task:
          - Produce a complete replacement body for the GitHub discussion associated with issue #$ISSUE_NUMBER.
          - The output must be valid Markdown only. Do not wrap it in code fences.
          - Keep the owned-artifact marker and source-issue lines.
          - Replace placeholder text with substantive content derived from the issue.
          - Resolve every open question by either answering it directly in the proposal or marking it \`DEFERRED-TO-PLAN\`.
          - Make the design specific enough that the next \`plan\` stage can proceed without operator clarification.
          - Do not invent unrelated scope or infrastructure not implied by the issue.

          Required structure:
          - # Design Discussion: <issue title>
          - owned-artifact marker comment
          - source issue lines
          - ## Summary
          - ## Problem
          - ## Goals
          - ## Non-goals
          - ## Proposed Approach
          - ## Open Questions
          - ## Exit Criteria

          Guidance:
          - The proposal should preserve the issue's intent and acceptance criteria.
          - Prefer concrete workflow/state-machine changes over abstract architecture prose.
          - For open questions that are better answered later, mark them \`DEFERRED-TO-PLAN\`.
          - The exit criteria checklist should be marked complete if the generated body itself satisfies the design gate.

          Source issue title:
          $ISSUE_TITLE

          Source issue body:
          ---
          $ISSUE_BODY
          ---

          Existing discussion body:
          ---
          $DISCUSSION_BODY
          ---
          EOF
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex author design proposal
        if: needs.intake.outputs.requested_stage == 'design'
        id: codex-design
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.design-author-prompt.outputs.prompt_file }}
          output-file: ${{ runner.temp }}/design-discussion.md
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Normalize design open questions
        if: needs.intake.outputs.requested_stage == 'design'
        shell: bash
        run: |
          set -euo pipefail

          draft_file="$RUNNER_TEMP/design-discussion.md"
          [ -s "$draft_file" ] || { echo "::error::Codex did not produce a design discussion draft"; exit 1; }

          python3 scripts/normalize_design_open_questions.py < "$draft_file" > "$draft_file.normalized"
          mv "$draft_file.normalized" "$draft_file"

      - name: Apply Codex design draft
        if: needs.intake.outputs.requested_stage == 'design'
        env:
          GH_TOKEN: ${{ steps.design-app-token.outputs.token }}
          DISCUSSION_ID: ${{ steps.design-context.outputs.discussion_id }}
        shell: bash
        run: |
          set -euo pipefail

          draft_file="$RUNNER_TEMP/design-discussion.md"
          [ -s "$draft_file" ] || { echo "::error::Codex did not produce a design discussion draft"; exit 1; }
          new_body="$(cat "$draft_file")"

          mutation=$(cat <<'GRAPHQL'
          mutation($discussionId: ID!, $body: String!) {
            updateDiscussion(input: {discussionId: $discussionId, body: $body}) {
              discussion {
                id
              }
            }
          }
          GRAPHQL
          )

          gh api graphql -f query="$mutation" -F discussionId="$DISCUSSION_ID" -f body="$new_body" >/dev/null
          echo "::notice::Codex authored design discussion draft"

      - name: Prepare Claude design review prompt
        if: needs.intake.outputs.requested_stage == 'design'
        id: design-review-prompt
        env:
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          discussion_body = Path(os.environ["RUNNER_TEMP"], "design-discussion.md").read_text()
          prompt = f"""Review the following design discussion for issue #{os.environ["ISSUE_NUMBER"]} and produce structured JSON only.

          Review goals:
          - Check whether the design is coherent, specific, and aligned to the source issue.
          - Prefer actionable critique over generic praise.
          - If the design is good enough for planning, say so clearly.
          - The review comment should read like a concise review from a second agent, not an approval checkbox dump.
          - Do not ask the operator to do work unless absolutely necessary.
          - Reply with markdown only. Do not wrap the response in JSON, YAML, or code fences.
          - Start the comment with `gpa:design-review:auto`.

          Source issue title:
          {os.environ["ISSUE_TITLE"]}

          Source issue body:
          ---
          {os.environ["ISSUE_BODY"]}
          ---

          Proposed design discussion:
          ---
          {discussion_body}
          ---
          """

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a") as fh:
              fh.write("prompt<<EOF\n")
              fh.write(prompt)
              if not prompt.endswith("\n"):
                  fh.write("\n")
              fh.write("EOF\n")
          PY

      - name: Post automated design review comment (pre-gate)
        if: needs.intake.outputs.requested_stage == 'design' && steps.design-app-token.outcome == 'success'
        id: claude-design-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.design-review-prompt.outputs.prompt }}
          show_full_output: ${{ vars.ORCHESTRATION_CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          claude_args: >-
            --max-turns 1
          allowed_bots: "*"

      - name: Publish Claude design review comment (pre-gate)
        if: needs.intake.outputs.requested_stage == 'design' && steps.design-app-token.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.design-app-token.outputs.token }}
          DISCUSSION_NUMBER: ${{ steps.scaffold-discussion.outputs.discussion_number }}
          REVIEW_EXECUTION_FILE: ${{ steps.claude-design-review.outputs.execution_file }}
        shell: bash
        run: |
          set -euo pipefail

          query=$(cat <<'GRAPHQL'
          query($owner: String!, $name: String!, $number: Int!) {
            repository(owner: $owner, name: $name) {
              discussion(number: $number) {
                id
                comments(first: 20) {
                  nodes {
                    body
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          discussion_json=$(gh api graphql -f query="$query" -f owner="$owner" -f name="$repo" -F number="$DISCUSSION_NUMBER")
          discussion_id=$(echo "$discussion_json" | jq -r '.data.repository.discussion.id // empty')

          existing_review=$(echo "$discussion_json" | jq -r '.data.repository.discussion.comments.nodes[].body // ""' | grep -F 'gpa:design-review:auto' || true)
          if [ -n "$existing_review" ]; then
            echo "::notice::Automated design review comment already exists; skipping"
            exit 0
          fi

          if [ -z "${REVIEW_EXECUTION_FILE:-}" ] || [ ! -f "$REVIEW_EXECUTION_FILE" ]; then
            echo "::error::Claude design review did not produce an execution file"
            exit 1
          fi

          review_body=$(
            jq -rs -r '
              map(if type == "array" then .[] else . end)
              | map(select(.type == "result" and .subtype == "success"))[-1].result // ""
            ' "$REVIEW_EXECUTION_FILE"
          )
          review_body=$(printf '%s' "$review_body" | perl -0pe 's/\A```[a-zA-Z0-9_-]*\n//; s/\n```\s*\z/\n/s')
          if [ -z "$review_body" ]; then
            echo "::error::Claude design review did not produce a comment body"
            exit 1
          fi

          mutation=$(cat <<'GRAPHQL'
          mutation($discussionId: ID!, $body: String!) {
            addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
              comment {
                id
              }
            }
          }
          GRAPHQL
          )

          gh api graphql -f query="$mutation" -F discussionId="$discussion_id" -f body="$review_body" >/dev/null
          echo "::notice::Posted automated design review comment to discussion #$DISCUSSION_NUMBER"

      # For the plan stage, scaffold the plan comment BEFORE the gate check.
      # The gate validates plan structure (headings, checklists, review expectations)
      # against the existing or just-created plan comment.
      - name: Scaffold implementation plan (pre-gate)
        if: needs.intake.outputs.requested_stage == 'plan'
        id: scaffold-plan
        uses: ./.github/actions/scaffold-impl-plan
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

      - name: Load implementation plan context
        if: needs.intake.outputs.requested_stage == 'plan'
        id: plan-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          comments_json=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          repo_full="${GITHUB_REPOSITORY}"
          owned_artifact_marker="gpa:owned-artifact:impl-plan:${repo_full}#${ISSUE_NUMBER}"

          comment_id=$(echo "$comments_json" | jq -r --arg marker "$owned_artifact_marker" '
            (map(select(.body | contains($marker))) + map(select(.body | test("(^|\\n)#{1,2}\\s+Implementation Plan"))))
            | .[0].id // empty
          ')
          comment_body=$(echo "$comments_json" | jq -r --arg marker "$owned_artifact_marker" '
            (map(select(.body | contains($marker))) + map(select(.body | test("(^|\\n)#{1,2}\\s+Implementation Plan"))))
            | .[0].body // ""
          ')

          if [ -z "$comment_id" ]; then
            echo "::error::Could not resolve implementation plan comment for issue #$ISSUE_NUMBER"
            exit 1
          fi

          {
            echo "comment_id=$comment_id"
            echo 'comment_body<<EOF'
            printf '%s\n' "$comment_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Load design discussion source for plan
        if: needs.intake.outputs.requested_stage == 'plan'
        id: plan-design-source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          discussion_url=$(gh issue view "$ISSUE_NUMBER" --comments --json comments --jq '
            .comments[]
            | select(.body | contains("gpa:design-discussion:#'"$ISSUE_NUMBER"'"))
            | .body
          ' | grep -oE 'https://github\.com/[^/]+/[^/]+/discussions/[0-9]+' | head -1 || true)

          if [ -z "$discussion_url" ]; then
            {
              echo "discussion_number="
              echo 'discussion_body<<EOF'
              echo
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "::notice::No linked design discussion found for plan authoring context"
            exit 0
          fi

          discussion_number=$(echo "$discussion_url" | grep -oE '[0-9]+$')
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          discussion_query=$(cat <<'GRAPHQL'
          query($owner: String!, $name: String!, $number: Int!) {
            repository(owner: $owner, name: $name) {
              discussion(number: $number) {
                body
              }
            }
          }
          GRAPHQL
          )
          discussion_json=$(gh api graphql -f query="$discussion_query" -f owner="$owner" -f name="$repo" -F number="$discussion_number")
          discussion_body=$(echo "$discussion_json" | jq -r '.data.repository.discussion.body // ""')

          {
            echo "discussion_number=$discussion_number"
            echo 'discussion_body<<EOF'
            printf '%s\n' "$discussion_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Codex implementation plan prompt
        if: needs.intake.outputs.requested_stage == 'plan'
        id: plan-author-prompt
        env:
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          PLAN_BODY: ${{ steps.plan-context.outputs.comment_body }}
          DESIGN_BODY: ${{ steps.plan-design-source.outputs.discussion_body }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/plan-author-prompt.md"
          cat > "$prompt_file" <<EOF
          You are Codex acting as the implementation planner for issue #$ISSUE_NUMBER.

          Task:
          - Produce a complete replacement body for the GitHub issue comment that holds the implementation plan.
          - Output valid Markdown only. Do not wrap it in code fences.
          - Preserve the owned-artifact marker and source issue lines.
          - Replace placeholder text with substantive content derived from the issue and design discussion.
          - Make the plan concrete enough that the execution stage can proceed autonomously with minimal operator input.
          - Keep the work bounded; do not invent unrelated scope.

          Required structure:
          - # Implementation Plan: <issue title>
          - owned-artifact marker comment
          - source issue lines
          - ## Implementation Plan
          - ## Acceptance Criteria
          - ## Verification Plan
          - ## Review Expectations
          - ## Slices
          - ## Exit Criteria

          Hard requirements:
          - Acceptance Criteria must contain checklist items.
          - Verification Plan must contain checklist items.
          - Review Expectations must include explicit dispositions for Accessibility, Usability/content, Documentation, and Hygiene.
          - Slices must be numbered and specific enough to execute in order.
          - Exit Criteria may mark items complete when the generated plan itself satisfies them.

          Source issue title:
          $ISSUE_TITLE

          Source issue body:
          ---
          $ISSUE_BODY
          ---

          Design discussion:
          ---
          $DESIGN_BODY
          ---

          Existing plan comment:
          ---
          $PLAN_BODY
          ---
          EOF
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex author implementation plan
        if: needs.intake.outputs.requested_stage == 'plan'
        id: codex-plan
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.plan-author-prompt.outputs.prompt_file }}
          output-file: ${{ runner.temp }}/implementation-plan.md
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Apply Codex implementation plan
        if: needs.intake.outputs.requested_stage == 'plan'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ steps.plan-context.outputs.comment_id }}
        shell: bash
        run: |
          set -euo pipefail

          draft_file="$RUNNER_TEMP/implementation-plan.md"
          [ -s "$draft_file" ] || { echo "::error::Codex did not produce an implementation plan draft"; exit 1; }
          new_body="$(cat "$draft_file")"

          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f "body=${new_body}" >/dev/null
          echo "::notice::Codex authored implementation plan comment"

      - name: Prepare Claude implementation plan review prompt
        if: needs.intake.outputs.requested_stage == 'plan'
        id: plan-review-prompt
        env:
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          plan_body = Path(os.environ["RUNNER_TEMP"], "implementation-plan.md").read_text()
          prompt = f"""Review the following implementation plan for issue #{os.environ["ISSUE_NUMBER"]}.

          Review goals:
          - Check whether the plan is bounded, executable, and aligned to the issue and design.
          - Prefer actionable critique over generic praise.
          - If the plan is good enough for execution, say so clearly.
          - Reply with markdown only. Do not wrap the response in JSON, YAML, or code fences.
          - Start the comment with `gpa:plan-review:auto`.
          - Keep the review concise and execution-oriented.

          Source issue title:
          {os.environ["ISSUE_TITLE"]}

          Source issue body:
          ---
          {os.environ["ISSUE_BODY"]}
          ---

          Proposed implementation plan:
          ---
          {plan_body}
          ---
          """

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a") as fh:
            fh.write("prompt<<EOF\n")
            fh.write(prompt)
            if not prompt.endswith("\n"):
              fh.write("\n")
            fh.write("EOF\n")
          PY

      - name: Post automated plan review comment (pre-gate)
        if: needs.intake.outputs.requested_stage == 'plan'
        id: claude-plan-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.plan-review-prompt.outputs.prompt }}
          show_full_output: ${{ vars.ORCHESTRATION_CLAUDE_SHOW_FULL_OUTPUT == 'true' }}
          claude_args: >-
            --max-turns 1
          allowed_bots: "*"

      - name: Publish Claude plan review comment (pre-gate)
        if: needs.intake.outputs.requested_stage == 'plan'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          REVIEW_EXECUTION_FILE: ${{ steps.claude-plan-review.outputs.execution_file }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
        shell: bash
        run: |
          set -euo pipefail

          comments_json=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          existing_review=$(echo "$comments_json" | jq -r --arg run_key "$RUN_KEY" '
            .[] | select(.body | contains("gpa:plan-review:auto") and contains($run_key)) | .body
          ')
          if [ -n "$existing_review" ]; then
            echo "::notice::Automated plan review comment already exists for this run; skipping"
            exit 0
          fi

          if [ -z "${REVIEW_EXECUTION_FILE:-}" ] || [ ! -f "$REVIEW_EXECUTION_FILE" ]; then
            echo "::error::Claude plan review did not produce an execution file"
            exit 1
          fi

          review_body=$(
            jq -rs -r '
              map(if type == "array" then .[] else . end)
              | map(select(.type == "result" and .subtype == "success"))[-1].result // ""
            ' "$REVIEW_EXECUTION_FILE"
          )
          review_body=$(printf '%s' "$review_body" | perl -0pe 's/\A```[a-zA-Z0-9_-]*\n//; s/\n```\s*\z/\n/s')
          if [ -z "$review_body" ]; then
            echo "::error::Claude plan review did not produce a comment body"
            exit 1
          fi

          review_body="<!-- gpa:run-status:plan-review:completed:${RUN_KEY} -->"$'\n\n'"${review_body}"
          gh issue comment "$ISSUE_NUMBER" --body "$review_body" >/dev/null
          echo "::notice::Posted automated plan review comment to issue #$ISSUE_NUMBER"

      - name: Validate execution agent credentials
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Execution authoring requires secrets.OPENAI_API_KEY"; exit 1; }

      - name: Prepare execution branch (pre-agent)
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: scaffold-execution
        uses: ./.github/actions/scaffold-execution
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}
          create_pr: 'false'

      - name: Load implementation plan source for execution
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-plan-source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          comments_json=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          repo_full="${GITHUB_REPOSITORY}"
          owned_artifact_marker="gpa:owned-artifact:impl-plan:${repo_full}#${ISSUE_NUMBER}"

          comment_body=$(echo "$comments_json" | jq -r --arg marker "$owned_artifact_marker" '
            (map(select(.body | contains($marker))) + map(select(.body | test("(^|\\n)#{1,2}\\s+Implementation Plan"))))
            | .[0].body // ""
          ')

          {
            echo 'plan_body<<EOF'
            printf '%s\n' "$comment_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check out execution branch
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        env:
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          default_branch=$(gh repo view "${GITHUB_REPOSITORY}" --json defaultBranchRef --jq '.defaultBranchRef.name')
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            echo "::notice::Remote branch '$BRANCH_NAME' does not exist yet; creating local branch from '$default_branch'"
            git fetch origin "$default_branch"
            git checkout -B "$BRANCH_NAME" "origin/$default_branch"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare Codex execution prompt
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-author-prompt
        env:
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          PLAN_BODY: ${{ steps.execution-plan-source.outputs.plan_body }}
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          FEEDBACK_INSTRUCTIONS: ${{ needs.intake.outputs.feedback_instructions }}
          SOURCE_COMMAND: ${{ needs.intake.outputs.source_command }}
          SOURCE_COMMENT_ID: ${{ needs.intake.outputs.source_comment_id }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/execution-author-prompt.md"
          cat > "$prompt_file" <<EOF
          You are Codex acting as the execution agent for issue #$ISSUE_NUMBER on branch $BRANCH_NAME.

          Task:
          - Implement the smallest coherent slice of the approved implementation plan directly in this repository.
          - Make real code and/or workflow changes; do not stop at comments or placeholder files.
          - Keep the change bounded to the issue and implementation plan.
          - Update any repository files necessary for the change to be reviewable.
          - Do not merge or open the PR yourself; the workflow will handle that.

          Required outcomes:
          - Leave the workspace with concrete file changes suitable for a review-ready PR.
          - Prefer a thin but functional vertical slice over a broad partial rewrite.
          - If the plan implies a new contract or docs that must change with code, update them now.

          Source issue title:
          $ISSUE_TITLE

          Source issue body:
          ---
          $ISSUE_BODY
          ---

          Implementation plan:
          ---
          $PLAN_BODY
          ---

          Operator feedback to address (if any):
          ---
          $FEEDBACK_INSTRUCTIONS
          ---

          Feedback source:
          - Source command: ${SOURCE_COMMAND:-none}
          - Source comment ID: ${SOURCE_COMMENT_ID:-none}
          - If present, feedback came from a trusted `gpa:feedback ...` command after the latest `gpa:review-ready` marker.
          EOF
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex implement execution slice
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: codex-execution
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.execution-author-prompt.outputs.prompt_file }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Commit and push execution changes
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-commit
        env:
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "::error::Execution agent did not produce any file changes"
            exit 1
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "::error::Execution agent changes could not be staged"
            exit 1
          fi

          git commit -m "feat: implement issue #${ISSUE_NUMBER} execution slice"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Create or recover execution PR (post-agent)
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-pr
        uses: ./.github/actions/scaffold-execution
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}
          create_pr: 'true'

      - name: Mark PR ready for review
        if: (needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation') && steps.execution-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.execution-pr.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail
          is_draft=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')
          if [ "$is_draft" = "true" ]; then
            gh pr ready "$PR_NUMBER"
            echo "::notice::Marked PR #$PR_NUMBER ready for review"
          else
            echo "::notice::PR #$PR_NUMBER already ready for review"
          fi

      # For the closeout stage, enforce pre-scaffold prerequisites BEFORE
      # scaffolding. This matches the standalone scaffold-closeout.yml sequence:
      # pre-scaffold gate (merged PR, branch deleted, follow-ups) → scaffold →
      # full gate (content checks). Without this, the orchestration path could
      # post a closeout retrospective on an issue that hasn't met prerequisites.
      - name: Pre-scaffold gate check (closeout)
        if: needs.intake.outputs.requested_stage == 'closeout'
        id: closeout-pre-gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          requested_stage: closeout
          issue_body: ${{ needs.intake.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_mode: pre-scaffold

      - name: Post closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.closeout-pre-gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- :x: \(.)"' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- :fast_forward: \(.)"' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — closeout pre-scaffold gate failed
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Prerequisites not met — scaffold not posted |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet prerequisites:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          Resolve the unmet prerequisites and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
        shell: bash
        run: |
          echo "::error::Closeout pre-scaffold gate failed. Unmet prerequisites: $UNMET"
          exit 1

      - name: Scaffold closeout retrospective (pre-gate)
        if: needs.intake.outputs.requested_stage == 'closeout' && steps.closeout-pre-gate.outputs.gate_passed != 'false'
        id: scaffold-closeout
        uses: ./.github/actions/scaffold-closeout
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

      - name: Refresh issue body
        id: issue-body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          body=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo 'body<<EOF'
            printf '%s\n' "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check gate conditions
        id: gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          requested_stage: ${{ needs.intake.outputs.requested_stage }}
          issue_body: ${{ steps.issue-body.outputs.body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trust_policy_path: config/trust-policy.yml

      - name: Post gate failure comment
        if: steps.gate.outputs.gate_passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — gate not satisfied
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :warning: Gate conditions not met |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet conditions:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          To override, post a comment: \`GATE-WAIVER: <condition> — <reason>\` and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on gate not passed
        if: steps.gate.outputs.gate_passed != 'true'
        env:
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        shell: bash
        run: |
          echo "::error::Gate conditions not met for stage '$REQUESTED_STAGE'"
          exit 1

      - name: Verify current state unchanged
        id: state-check
        if: steps.gate.outputs.gate_passed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        run: |
          # §Idempotency — Manual path dedup obligations, rule 2: current-state check
          # Verify the issue hasn't changed since the run started (still open, no
          # do-not-automate label added). Posts a mismatch comment per contract.
          issue_json=$(gh issue view "$ISSUE_NUMBER" --json state,labels 2>/dev/null || echo '{}')
          issue_state=$(echo "$issue_json" | jq -r '.state // "UNKNOWN"')
          has_block_label=$(echo "$issue_json" | jq -r '.labels[]? | select(.name == "do-not-automate") | .name' || true)

          mismatch=""
          if [ "$issue_state" = "CLOSED" ]; then
            mismatch="Issue #$ISSUE_NUMBER was closed between eligibility check and gate pass"
          elif [ -n "$has_block_label" ]; then
            mismatch="Issue #$ISSUE_NUMBER had do-not-automate label added between eligibility check and gate pass"
          fi

          if [ -n "$mismatch" ]; then
            echo "::error::$mismatch"
            gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — superseded (state mismatch)
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :stop_sign: Superseded — state changed during run |
          | **Reason** | $mismatch |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
            )"
            echo "state_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "state_valid=true" >> "$GITHUB_OUTPUT"

      - name: Post success comment
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          WAIVED: ${{ needs.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "")
          waived_section=""
          if [ -n "$waived_list" ]; then
            waived_section="
          **Waived conditions:**
          $waived_list"
          fi

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — stage transition accepted
          <!-- gpa:run-status:$REQUESTED_STAGE:completed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :white_check_mark: Eligible and gate passed |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          $waived_section
          COMMENT_EOF
          )"

      # Post-gate action: capture follow-ups after gate confirms markers exist
      # and execution is complete. Unlike pre-gate scaffolds, this runs AFTER
      # the gate passes because it creates external artifacts (new issues).
      - name: Capture follow-ups (post-gate)
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'follow-up-capture'
        id: capture-follow-ups
        uses: ./.github/actions/capture-follow-ups
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

  # ── handoff ─────────────────────────────────────────────────────────
  # Queue the next stage when the current one completes successfully.
  handoff:
    needs: [intake, gate]
    if: needs.intake.outputs.duplicate != 'true' && needs.gate.outputs.gate_passed == 'true' && needs.gate.outputs.state_valid == 'true'
    runs-on: ubuntu-latest
    outputs:
      next_stage: ${{ steps.resolve.outputs.next_stage }}
      target_status: ${{ steps.resolve.outputs.target_status }}
      next_run_key: ${{ steps.next-run-key.outputs.run_key }}
      status_updated: ${{ steps.sync-status.outputs.updated }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - name: Create orchestration app token
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-organization-projects: write

      - name: Resolve next stage
        id: resolve
        shell: bash
        env:
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        run: |
          case "$REQUESTED_STAGE" in
            kickoff)
              next_stage="clarification"
              target_status="In Progress"
              ;;
            clarification)
              next_stage="design"
              target_status="In Progress"
              ;;
            design)
              next_stage="plan"
              target_status="In Progress"
              ;;
            plan)
              next_stage="execution"
              target_status="In Progress"
              ;;
            execution)
              next_stage="deploy-review"
              target_status="In Review"
              ;;
            deploy-review)
              next_stage="review-intake"
              target_status="In Review"
              ;;
            review-intake)
              next_stage="merge"
              target_status="Approved"
              ;;
            feedback-implementation)
              next_stage="redeploy-review"
              target_status="In Review"
              ;;
            redeploy-review)
              next_stage="review-intake"
              target_status="In Review"
              ;;
            review)
              next_stage="merge"
              target_status="Approved"
              ;;
            merge)
              next_stage="post-merge-verify"
              target_status="In Progress"
              ;;
            post-merge-verify)
              next_stage="follow-up-capture"
              target_status="In Progress"
              ;;
            follow-up-capture)
              next_stage="closeout"
              target_status="In Progress"
              ;;
            closeout)
              next_stage=""
              target_status="Done"
              ;;
            *)
              echo "::error::Unknown requested_stage '$REQUESTED_STAGE'"
              exit 1
              ;;
          esac

          echo "next_stage=$next_stage" >> "$GITHUB_OUTPUT"
          echo "target_status=$target_status" >> "$GITHUB_OUTPUT"

      - name: Sync project Status
        if: needs.intake.outputs.project_item_id != '' && steps.app-token.outcome == 'success'
        id: sync-status
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ITEM_ID: ${{ needs.intake.outputs.project_item_id }}
          TARGET_STATUS: ${{ steps.resolve.outputs.target_status }}
        run: |
          set -euo pipefail

          metadata_query=$(cat <<'GRAPHQL'
          query($itemId: ID!) {
            node(id: $itemId) {
              ... on ProjectV2Item {
                id
                fieldValues(first: 20) {
                  nodes {
                    ... on ProjectV2ItemFieldSingleSelectValue {
                      name
                      field {
                        ... on ProjectV2FieldCommon {
                          name
                        }
                      }
                    }
                  }
                }
                project {
                  ... on ProjectV2 {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          metadata=$(gh api graphql -f query="$metadata_query" -F itemId="$PROJECT_ITEM_ID")

          project_id=$(echo "$metadata" | jq -r '.data.node.project.id // empty')
          status_field_id=$(echo "$metadata" | jq -r '.data.node.project.fields.nodes[] | select(.name == "Status") | .id' | head -1)
          status_option_id=$(echo "$metadata" | jq -r --arg target "$TARGET_STATUS" '.data.node.project.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == $target) | .id' | head -1)
          current_status=$(echo "$metadata" | jq -r '.data.node.fieldValues.nodes[] | select(.field.name == "Status") | .name // empty' | head -1)

          if [ -z "$project_id" ] || [ -z "$status_field_id" ] || [ -z "$status_option_id" ]; then
            echo "::error::Could not resolve project metadata for Status synchronization"
            exit 1
          fi

          if [ "$current_status" = "$TARGET_STATUS" ]; then
            echo "::notice::Project Status already '$TARGET_STATUS'"
            echo "updated=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mutation=$(cat <<'GRAPHQL'
          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
            updateProjectV2ItemFieldValue(
              input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }
            ) {
              projectV2Item {
                id
              }
            }
          }
          GRAPHQL
          )

          gh api graphql \
            -f query="$mutation" \
            -F projectId="$project_id" \
            -F itemId="$PROJECT_ITEM_ID" \
            -F fieldId="$status_field_id" \
            -F optionId="$status_option_id" >/dev/null

          echo "::notice::Updated project Status to '$TARGET_STATUS'"
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Skip project Status sync
        if: needs.intake.outputs.project_item_id == ''
        shell: bash
        run: |
          echo "::notice::No project_item_id provided; skipping project Status sync"

      - name: Fail if app credentials are unavailable for closed-loop sync
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID == ''
        shell: bash
        run: |
          echo "::error::Closed-loop project synchronization requires vars.ORCHESTRATION_APP_ID to be available to this repository"
          exit 1

      - name: Fail if app token could not be created for closed-loop sync
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID != '' && steps.app-token.outcome != 'success'
        shell: bash
        run: |
          echo "::error::Closed-loop project synchronization requires GitHub App credentials in Actions: vars.ORCHESTRATION_APP_ID and secrets.ORCHESTRATION_APP_PRIVATE_KEY"
          exit 1

      - name: Generate next run key
        if: steps.resolve.outputs.next_stage != '' && steps.app-token.outcome == 'success'
        id: next-run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
        run: |
          timestamp=$(date +%s%3N)
          run_key="${REPO_NAME}/${ISSUE_NUMBER}/${NEXT_STAGE}/${timestamp}"
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"

      - name: Dispatch next stage
        if: steps.resolve.outputs.next_stage != '' && needs.intake.outputs.project_item_id != '' && steps.app-token.outcome == 'success'
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
          NEXT_RUN_KEY: ${{ steps.next-run-key.outputs.run_key }}
          NEXT_TIMESTAMP: ${{ steps.next-run-key.outputs.timestamp }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          PROJECT_ITEM_ID: ${{ needs.intake.outputs.project_item_id }}
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=orchestration-start \
            -F "client_payload[issue_number]=$ISSUE_NUMBER" \
            -f "client_payload[issue_title]=$ISSUE_TITLE" \
            -f "client_payload[requested_stage]=$NEXT_STAGE" \
            -f "client_payload[run_key]=$NEXT_RUN_KEY" \
            -f "client_payload[actor]=$ACTOR" \
            -f "client_payload[timestamp]=$NEXT_TIMESTAMP" \
            -f "client_payload[project_item_id]=$PROJECT_ITEM_ID"

          echo "dispatched=true" >> "$GITHUB_OUTPUT"

      - name: Post next-stage queued comment
        if: steps.dispatch.outputs.dispatched == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
          NEXT_RUN_KEY: ${{ steps.next-run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          gh issue comment "$ISSUE_NUMBER" -R "$GITHUB_REPOSITORY" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — next stage queued
          <!-- gpa:run-status:$NEXT_STAGE:started:$NEXT_RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$NEXT_RUN_KEY\` |
          | **Requested stage** | \`$NEXT_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :rocket: Next stage queued automatically |
          | **Parent run** | [$RUN_ID]($RUN_URL) |

          The next stage was dispatched automatically after the current stage passed.
          COMMENT_EOF
          )"

      - name: Skip next-stage dispatch without project item context
        if: steps.resolve.outputs.next_stage != '' && needs.intake.outputs.project_item_id == ''
        shell: bash
        run: |
          echo "::notice::No project_item_id provided; skipping automatic next-stage dispatch"

      - name: Record terminal stage
        if: steps.resolve.outputs.next_stage == ''
        shell: bash
        run: |
          echo "::notice::Current stage is terminal; no next stage will be queued"

  # ── summary ─────────────────────────────────────────────────────────
  # Always-runs job that produces the Actions job summary.
  summary:
    needs: [intake, gate, handoff]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Query run history
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        env:
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          ELIGIBLE: ${{ needs.intake.outputs.eligible }}
          DUPLICATE: ${{ needs.intake.outputs.duplicate }}
          GATE_PASSED: ${{ needs.gate.outputs.gate_passed }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          REPO: ${{ github.repository }}
          TRIGGER: ${{ needs.intake.outputs.trigger }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
          NEXT_STAGE: ${{ needs.handoff.outputs.next_stage }}
          TARGET_STATUS: ${{ needs.handoff.outputs.target_status }}
          STATUS_UPDATED: ${{ needs.handoff.outputs.status_updated }}
          HANDOFF_DISPATCHED: ${{ needs.handoff.outputs.dispatched }}
          NEXT_RUN_KEY: ${{ needs.handoff.outputs.next_run_key }}
        shell: bash
        run: |
          # Determine next-step hint based on the requested stage
          next_step=""
          case "$REQUESTED_STAGE" in
            design)
              next_step="Fill in the design discussion, resolve open questions, then re-trigger with \`requested_stage: design\`"
              ;;
            plan)
              next_step="Fill in the implementation plan with substantive content, then re-trigger with \`requested_stage: plan\`"
              ;;
            execution)
              next_step="Implement the feature, fill in the PR, mark ready for review, then re-trigger with \`requested_stage: execution\`"
              ;;
            follow-up-capture)
              next_step="Review created follow-up issues, then proceed to closeout with \`requested_stage: closeout\`"
              ;;
            closeout)
              next_step="Complete the retrospective sections and exit checklist, then close the issue"
              ;;
            *)
              next_step="Check issue [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) for current status"
              ;;
          esac

          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Orchestration Dispatch Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Stage | \`$REQUESTED_STAGE\` |"
            echo "| Actor | $ACTOR |"
            echo "| Duplicate | ${DUPLICATE:-false} |"
            echo "| Eligible | ${ELIGIBLE:-n/a} |"
            echo "| Gate passed | ${GATE_PASSED:-n/a} |"
            echo "| Project Status target | ${TARGET_STATUS:-n/a} |"
            echo "| Project Status updated | ${STATUS_UPDATED:-false} |"
            echo "| Next stage | ${NEXT_STAGE:-n/a} |"
            echo "| Next stage queued | ${HANDOFF_DISPATCHED:-false} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- $next_step"
            if [ -n "${NEXT_STAGE:-}" ] && [ -n "${NEXT_RUN_KEY:-}" ]; then
              echo "- Auto-handoff dispatched \`${NEXT_STAGE}\` with run key \`${NEXT_RUN_KEY}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
