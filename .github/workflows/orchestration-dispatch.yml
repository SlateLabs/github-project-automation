name: Orchestration Dispatch
run-name: >-
  ${{ github.event_name == 'repository_dispatch'
      && format('{0} (#{1}) - {2}',
                github.event.client_payload.issue_title || 'Issue',
                github.event.client_payload.issue_number,
                github.event.client_payload.requested_stage)
      || format('#{0} - {1}', github.event.inputs.issue_number, github.event.inputs.requested_stage) }}

on:
  repository_dispatch:
    types: [orchestration-start]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      requested_stage:
        description: 'Target stage for the transition'
        required: true
        type: choice
        options:
          - kickoff
          - clarification
          - design
          - plan
          - execution
          - agent-review
          - follow-up-capture
          - merge
          - closeout

permissions:
  contents: write
  issues: write
  discussions: write
  pull-requests: write

# ──────────────────────────────────────────────────────────────────────
# Job graph:
#
#   intake
#     │
#   gate
#     │
#   handoff
#     │
#   summary  (always runs)
# ──────────────────────────────────────────────────────────────────────

jobs:
  # ── intake ──────────────────────────────────────────────────────────
  # Parse the incoming request and generate a run key.
  intake:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.normalize.outputs.issue_number }}
      requested_stage: ${{ steps.normalize.outputs.requested_stage }}
      actor: ${{ steps.normalize.outputs.actor }}
      trigger: ${{ steps.normalize.outputs.trigger }}
      project_item_id: ${{ steps.project-context.outputs.project_item_id }}
      run_key: ${{ steps.run-key.outputs.run_key }}
      timestamp: ${{ steps.run-key.outputs.timestamp }}
      feedback_body: ${{ steps.feedback-context.outputs.feedback_body }}
      feedback_source: ${{ steps.feedback-context.outputs.feedback_source }}
      duplicate: ${{ steps.dedup.outputs.duplicate }}
      eligible: ${{ steps.eligibility.outputs.eligible }}
      reason: ${{ steps.eligibility.outputs.reason }}
      issue_title: ${{ steps.eligibility.outputs.issue_title }}
      issue_body: ${{ steps.eligibility.outputs.issue_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Normalize inputs
        id: normalize
        shell: bash
        env:
          TRIGGER: ${{ github.event_name }}
          WD_ISSUE_NUMBER: ${{ inputs.issue_number }}
          WD_REQUESTED_STAGE: ${{ inputs.requested_stage }}
          WD_ACTOR: ${{ github.actor }}
          RD_ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          RD_REQUESTED_STAGE: ${{ github.event.client_payload.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
          RD_ACTOR: ${{ github.event.client_payload.actor }}
          RD_TIMESTAMP: ${{ github.event.client_payload.timestamp }}
          RD_PROJECT_ITEM_ID: ${{ github.event.client_payload.project_item_id }}
          RD_FEEDBACK_BODY: ${{ github.event.client_payload.feedback_body }}
          RD_FEEDBACK_SOURCE: ${{ github.event.client_payload.feedback_source }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          VALID_STAGES="kickoff clarification design plan execution agent-review deploy-review feedback-implementation follow-up-capture merge closeout"

          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # --- Validate repository_dispatch payload ---
            errors=()

            # issue_number: must be a positive integer
            if [ -z "${RD_ISSUE_NUMBER:-}" ]; then
              errors+=("missing required field: issue_number")
            elif ! echo "$RD_ISSUE_NUMBER" | grep -qE '^[1-9][0-9]*$'; then
              errors+=("issue_number must be a positive integer, got: '${RD_ISSUE_NUMBER}'")
            fi

            # requested_stage: must be a known stage
            if [ -z "${RD_REQUESTED_STAGE:-}" ]; then
              errors+=("missing required field: requested_stage")
            else
              stage_valid="false"
              for s in $VALID_STAGES; do
                if [ "$s" = "$RD_REQUESTED_STAGE" ]; then
                  stage_valid="true"
                  break
                fi
              done
              if [ "$stage_valid" = "false" ]; then
                errors+=("unknown requested_stage: '${RD_REQUESTED_STAGE}'")
              fi
            fi

            # run_key: must match <owner>/<repo>/<number>/<stage>/<timestamp>
            # AND parsed components must be consistent with the other payload fields
            if [ -z "${RD_RUN_KEY:-}" ]; then
              errors+=("missing required field: run_key")
            elif ! echo "$RD_RUN_KEY" | grep -qE '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/[0-9]+/[A-Za-z0-9_-]+/[0-9]+$'; then
              errors+=("run_key does not match canonical format '<owner>/<repo>/<number>/<stage>/<timestamp>', got: '${RD_RUN_KEY}'")
            else
              # Parse run_key and validate consistency with payload fields
              rk_owner=$(echo "$RD_RUN_KEY" | cut -d/ -f1)
              rk_repo=$(echo "$RD_RUN_KEY" | cut -d/ -f2)
              rk_issue=$(echo "$RD_RUN_KEY" | cut -d/ -f3)
              rk_stage=$(echo "$RD_RUN_KEY" | cut -d/ -f4)
              rk_timestamp=$(echo "$RD_RUN_KEY" | cut -d/ -f5)

              if [ -n "${CURRENT_REPO:-}" ] && [ "${rk_owner}/${rk_repo}" != "$CURRENT_REPO" ]; then
                errors+=("run_key repo '${rk_owner}/${rk_repo}' does not match current repo '${CURRENT_REPO}'")
              fi
              if [ -n "${RD_ISSUE_NUMBER:-}" ] && [ "$rk_issue" != "$RD_ISSUE_NUMBER" ]; then
                errors+=("run_key issue_number '${rk_issue}' does not match client_payload.issue_number '${RD_ISSUE_NUMBER}'")
              fi
              if [ -n "${RD_REQUESTED_STAGE:-}" ] && [ "$rk_stage" != "$RD_REQUESTED_STAGE" ]; then
                errors+=("run_key stage '${rk_stage}' does not match client_payload.requested_stage '${RD_REQUESTED_STAGE}'")
              fi
              if [ -n "${RD_TIMESTAMP:-}" ] && [ "$rk_timestamp" != "$RD_TIMESTAMP" ]; then
                errors+=("run_key timestamp '${rk_timestamp}' does not match client_payload.timestamp '${RD_TIMESTAMP}'")
              fi
            fi

            # actor: must be non-empty
            if [ -z "${RD_ACTOR:-}" ]; then
              errors+=("missing required field: actor")
            fi

            # timestamp: must be non-empty
            if [ -z "${RD_TIMESTAMP:-}" ]; then
              errors+=("missing required field: timestamp")
            fi

            if [ ${#errors[@]} -gt 0 ]; then
              error_msg="repository_dispatch payload validation failed:"
              for e in "${errors[@]}"; do
                error_msg="${error_msg}\n- ${e}"
              done
              echo "::error::${error_msg}"

              # Post diagnostic comment if issue_number is parseable
              if echo "${RD_ISSUE_NUMBER:-}" | grep -qE '^[1-9][0-9]*$'; then
                diagnostic="### Orchestration run — payload validation failed\n\n"
                diagnostic+="The \`repository_dispatch\` payload for \`orchestration-start\` failed validation:\n\n"
                for e in "${errors[@]}"; do
                  diagnostic+="- ${e}\n"
                done
                diagnostic+="\nExpected payload: \`{ issue_number, requested_stage, run_key, actor, timestamp }\`"
                diagnostic+="\nOptional closed-loop field: \`project_item_id\`"
                echo -e "$diagnostic" | gh issue comment "${RD_ISSUE_NUMBER}" --body-file -
              fi

              exit 1
            fi

            # Normalized outputs for repository_dispatch
            echo "issue_number=${RD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${RD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${RD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=repository_dispatch" >> "$GITHUB_OUTPUT"
            echo "project_item_id=${RD_PROJECT_ITEM_ID}" >> "$GITHUB_OUTPUT"
            {
              echo 'feedback_body<<EOF'
              printf '%s\n' "${RD_FEEDBACK_BODY:-}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "feedback_source=${RD_FEEDBACK_SOURCE}" >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from repository_dispatch (actor: ${RD_ACTOR}, issue: ${RD_ISSUE_NUMBER}, stage: ${RD_REQUESTED_STAGE})"
          else
            # --- workflow_dispatch: pass through existing inputs ---
            echo "issue_number=${WD_ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "requested_stage=${WD_REQUESTED_STAGE}" >> "$GITHUB_OUTPUT"
            echo "actor=${WD_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "trigger=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "project_item_id=" >> "$GITHUB_OUTPUT"
            {
              echo 'feedback_body<<EOF'
              echo ''
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "feedback_source=" >> "$GITHUB_OUTPUT"
            echo "::notice::Normalized inputs from workflow_dispatch (actor: ${WD_ACTOR}, issue: ${WD_ISSUE_NUMBER}, stage: ${WD_REQUESTED_STAGE})"
          fi

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          TRIGGER: ${{ steps.normalize.outputs.trigger }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ steps.normalize.outputs.issue_number }}
          STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RD_RUN_KEY: ${{ github.event.client_payload.run_key }}
        run: |
          if [ "$TRIGGER" = "repository_dispatch" ]; then
            # Preserve gateway-provided run key
            run_key="$RD_RUN_KEY"
            # Extract timestamp from run key (last segment) for logging
            timestamp=$(echo "$run_key" | rev | cut -d/ -f1 | rev)
          else
            # Generate fresh run key for manual trigger
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/${STAGE}/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"

      - name: Resolve feedback context
        id: feedback-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          INPUT_FEEDBACK_BODY: ${{ steps.normalize.outputs.feedback_body }}
          INPUT_FEEDBACK_SOURCE: ${{ steps.normalize.outputs.feedback_source }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          TRIGGER: ${{ steps.normalize.outputs.trigger }}
        shell: bash
        run: |
          set -euo pipefail

          feedback_body="${INPUT_FEEDBACK_BODY:-}"
          feedback_source="${INPUT_FEEDBACK_SOURCE:-}"

          if [ "$REQUESTED_STAGE" = "feedback-implementation" ] && [ -z "$feedback_body" ]; then
            comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments)
            target_comment=$(
              printf '%s' "$comments_json" |
                jq -r '.comments | map(select(.body | contains("gpa:run-status:agent-review:completed:"))) | last | .body // ""'
            )
            recovered=$(
              printf '%s\n' "$target_comment" |
                awk '
                  BEGIN { table_done = 0; blank_run = 0; payload = "" }
                  !table_done {
                    if ($0 ~ /^\| \*\*Disposition\*\* \|/) {
                      table_done = 1
                    }
                    next
                  }
                  {
                    if ($0 ~ /^[[:space:]]*$/) {
                      blank_run++
                      if (length(payload)) {
                        payload = payload ORS $0
                      }
                      next
                    }
                    if (blank_run < 1) {
                      next
                    }
                    if (length(payload)) {
                      payload = payload ORS $0
                    } else {
                      payload = $0
                    }
                  }
                  END { print payload }
                '
            )
            if [ -n "$recovered" ]; then
              feedback_body="$recovered"
              feedback_source="${feedback_source:-agent}"
              echo "::notice::Recovered feedback body from latest agent-review comment"
            fi
          fi

          {
            echo 'feedback_body<<EOF'
            printf '%s\n' "$feedback_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "feedback_source=$feedback_source" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $RUN_KEY (source: $TRIGGER)"

      - name: Create orchestration app token (project item recovery)
        if: steps.normalize.outputs.project_item_id == '' && vars.ORCHESTRATION_APP_ID != ''
        id: intake-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-organization-projects: write

      - name: Recover project item context
        id: project-context
        shell: bash
        env:
          PROVIDED_PROJECT_ITEM_ID: ${{ steps.normalize.outputs.project_item_id }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          GH_TOKEN: ${{ steps.intake-app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [ -n "$PROVIDED_PROJECT_ITEM_ID" ]; then
            echo "project_item_id=$PROVIDED_PROJECT_ITEM_ID" >> "$GITHUB_OUTPUT"
            echo "::notice::Using provided project_item_id from event payload"
            exit 0
          fi

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "project_item_id=" >> "$GITHUB_OUTPUT"
            echo "::notice::No GitHub App token available for project item recovery"
            exit 0
          fi
          recovered_id=$(python3 scripts/recover_project_item.py --repo "$GITHUB_REPOSITORY" --issue-number "$ISSUE_NUMBER")

          echo "project_item_id=$recovered_id" >> "$GITHUB_OUTPUT"
          if [ -n "$recovered_id" ]; then
            echo "::notice::Recovered project_item_id from project membership: $recovered_id"
          else
            echo "::notice::Issue is not linked to an open project item; closed-loop sync remains disabled"
          fi

      - name: Check for recent duplicate run
        id: dedup
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          REPO_NAME: ${{ github.repository }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # §Idempotency — Manual path dedup obligations, rule 1: recent-run check
          # Scan the last 10 issue comments for a successful orchestration run comment
          # with the same <repo>/<issue-number>/<requested-stage> prefix completed
          # within the dedup window.
          DEDUP_WINDOW_SECONDS=60
          run_prefix="${REPO_NAME}/${ISSUE_NUMBER}/${REQUESTED_STAGE}/"
          current_epoch=$(date +%s)

          recent_comments=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
            --jq '[.comments | sort_by(.createdAt) | reverse | .[:10] | .[] | select(.body | test("stage transition accepted")) | .body]' 2>/dev/null || echo '[]')

          duplicate="false"

          # Check each recent success comment for a matching run key prefix
          comment_count=$(echo "$recent_comments" | jq 'length')
          for (( i=0; i<comment_count; i++ )); do
            comment_body=$(echo "$recent_comments" | jq -r ".[$i]")
            # Extract run key from the comment (structured format: repo/issue/stage/timestamp)
            found_key=$(echo "$comment_body" | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_-]+/[0-9]+/${REQUESTED_STAGE}/[0-9]+" | head -1 || true)
            if [ -n "$found_key" ]; then
              # Extract timestamp from run key (last segment, milliseconds)
              key_timestamp_ms=$(echo "$found_key" | rev | cut -d/ -f1 | rev)
              key_timestamp_s=$((key_timestamp_ms / 1000))
              elapsed=$((current_epoch - key_timestamp_s))
              if [ "$elapsed" -lt "$DEDUP_WINDOW_SECONDS" ] && [ "$elapsed" -ge 0 ]; then
                duplicate="true"
                break
              fi
            fi
          done

          # Check for GATE-WAIVER: dedup to force past the dedup check
          # Trust-scoped: only accept waivers from actors in trusted_users (§4 rule 5)
          if [ "$duplicate" = "true" ]; then
            trusted_users_list=""
            trust_policy="config/trust-policy.yml"
            if [ -f "$trust_policy" ]; then
              trusted_users_list=$(grep -A 100 '^trusted_users:' "$trust_policy" \
                | grep -E '^\s*-\s+' | sed 's/.*-\s*//' | tr -d ' ' || true)
            fi

            waiver_found="false"
            waiver_comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
              --jq '.comments[] | {author: .author.login, body: .body}' 2>/dev/null || true)
            while IFS= read -r comment_line; do
              [ -z "$comment_line" ] && continue
              comment_author=$(echo "$comment_line" | jq -r '.author // ""')
              comment_body=$(echo "$comment_line" | jq -r '.body // ""')
              # Only accept waivers from trusted users
              author_trusted="false"
              if [ -n "$trusted_users_list" ]; then
                while IFS= read -r tuser; do
                  if [ "$tuser" = "$comment_author" ]; then
                    author_trusted="true"
                    break
                  fi
                done <<< "$trusted_users_list"
              fi
              if [ "$author_trusted" = "true" ] && echo "$comment_body" | grep -qi 'GATE-WAIVER:.*dedup'; then
                waiver_found="true"
                echo "::notice::Dedup window active but trusted GATE-WAIVER: dedup found from @$comment_author — proceeding"
                break
              fi
            done < <(echo "$waiver_comments_json" | jq -c '.' 2>/dev/null || true)

            if [ "$waiver_found" = "true" ]; then
              duplicate="false"
            fi
          fi

          echo "duplicate=$duplicate" >> "$GITHUB_OUTPUT"

          if [ "$duplicate" = "true" ]; then
            echo "::warning::Skipping: a recent run for this issue/stage completed within the ${DEDUP_WINDOW_SECONDS}s dedup window"
            gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py duplicate)"
          fi

      - name: Validate eligibility
        if: steps.dedup.outputs.duplicate != 'true'
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ steps.normalize.outputs.issue_number }}
          requested_stage: ${{ steps.normalize.outputs.requested_stage }}
          actor: ${{ steps.normalize.outputs.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.normalize.outputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ steps.normalize.outputs.requested_stage }}
          ACTOR: ${{ steps.normalize.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py ineligible)"

      - name: Fail on ineligible
        if: steps.dedup.outputs.duplicate != 'true' && steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

  stage_design:
    needs: intake
    if: needs.intake.outputs.duplicate != 'true' && needs.intake.outputs.requested_stage == 'design'
    uses: ./.github/workflows/run-design-stage.yml
    with:
      issue_number: ${{ needs.intake.outputs.issue_number }}
      issue_title: ${{ needs.intake.outputs.issue_title }}
      issue_body: ${{ needs.intake.outputs.issue_body }}
      run_key: ${{ needs.intake.outputs.run_key }}
      actor: ${{ needs.intake.outputs.actor }}
      orchestration_app_id: ${{ vars.ORCHESTRATION_APP_ID }}
    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      orchestration_app_private_key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}

  stage_plan:
    needs: intake
    if: needs.intake.outputs.duplicate != 'true' && needs.intake.outputs.requested_stage == 'plan'
    uses: ./.github/workflows/run-plan-stage.yml
    with:
      issue_number: ${{ needs.intake.outputs.issue_number }}
      issue_title: ${{ needs.intake.outputs.issue_title }}
      issue_body: ${{ needs.intake.outputs.issue_body }}
      run_key: ${{ needs.intake.outputs.run_key }}
      actor: ${{ needs.intake.outputs.actor }}
    secrets:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}

  # ── gate ────────────────────────────────────────────────────────────
  # Create artifacts, evaluate gates, and record stage advancement.
  gate:
    needs: [intake, stage_design, stage_plan]
    if: needs.intake.outputs.duplicate != 'true'
    runs-on: ubuntu-latest
    outputs:
      gate_passed: ${{ steps.gate.outputs.gate_passed }}
      unmet_conditions: ${{ steps.gate.outputs.unmet_conditions }}
      waived_conditions: ${{ steps.gate.outputs.waived_conditions }}
      state_valid: ${{ steps.state-check.outputs.state_valid }}
      review_disposition: ${{ steps.parse-agent-review.outputs.disposition }}
      review_next_stage: ${{ steps.parse-agent-review.outputs.next_stage }}
      review_feedback_body: ${{ steps.parse-agent-review.outputs.feedback_body }}
      feedback_no_progress: ${{ steps.feedback-progress.outputs.no_progress }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scaffold clarification issue body (pre-gate)
        if: needs.intake.outputs.requested_stage == 'clarification'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
        shell: bash
        run: |
          set -euo pipefail

          body="$ISSUE_BODY"
          changed="false"

          if ! printf '%s\n' "$body" | grep -qE '^#{1,2}\s+Scope'; then
            body="${body}"$'\n\n'"## Scope"$'\n'"- Initial scope to be refined by orchestration."$'\n'
            changed="true"
          fi

          if printf '%s\n' "$body" | grep -qE '^#{1,2}\s+Open Questions'; then
            rewritten_body="$(printf '%s' "$body" | python3 scripts/defer_open_questions.py)"
            if [ "$rewritten_body" != "$body" ]; then
              body="$rewritten_body"
              changed="true"
            fi
          fi

          if [ "$changed" = "true" ]; then
            tmp_body=$(mktemp)
            printf '%s\n' "$body" > "$tmp_body"
            gh issue edit "$ISSUE_NUMBER" --body-file "$tmp_body"
            echo "::notice::Clarification scaffold updated issue body (headings and deferred open questions)"
          else
            echo "::notice::Issue body already satisfies clarification scaffold defaults"
          fi

      - name: Validate execution agent credentials
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Execution authoring requires secrets.OPENAI_API_KEY"; exit 1; }

      - name: Create orchestration app token (execution)
        if: (needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation') && vars.ORCHESTRATION_APP_ID != ''
        id: execution-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Validate agent review credentials
        if: needs.intake.outputs.requested_stage == 'agent-review'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Agent review requires secrets.OPENAI_API_KEY"; exit 1; }

      - name: Prepare execution branch (pre-agent)
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: scaffold-execution
        uses: ./.github/actions/scaffold-execution
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}
          create_pr: 'false'

      - name: Load feedback loop context
        if: needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: feedback-loop-context
        env:
          GH_TOKEN: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,headRefName,headRefOid,updatedAt --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))] | sort_by(.updatedAt) | reverse | .[0]" 2>/dev/null || echo '')
          current_pr_sha=$(echo "$pr_json" | jq -r '.headRefOid // empty' 2>/dev/null || true)

          comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments)
          comments_json_file=$(mktemp)
          trap 'rm -f "$comments_json_file"' EXIT
          printf '%s' "$comments_json" > "$comments_json_file"
          last_reviewed_sha=$(python3 - "$comments_json_file" <<'PY'
          import json, re, sys
          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              payload = json.load(fh)
          comments = payload.get("comments", [])
          blocks = []
          current = None
          marker = "gpa:run-status:agent-review:completed:"
          for comment in comments:
              body = comment.get("body", "")
              if marker in body:
                  current = body
                  blocks.append(current)
          sha = ""
          if blocks:
              body = blocks[-1]
              m = re.search(r"\| \*\*PR head SHA\*\* \| `([0-9a-f]{7,40})` \|", body)
              if m:
                  sha = m.group(1)
          print(sha)
          PY
          )

          echo "current_pr_sha=$current_pr_sha" >> "$GITHUB_OUTPUT"
          echo "last_reviewed_sha=$last_reviewed_sha" >> "$GITHUB_OUTPUT"

      - name: Load implementation plan source for execution
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-plan-source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          comments_json=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          repo_full="${GITHUB_REPOSITORY}"
          owned_artifact_marker="gpa:owned-artifact:impl-plan:${repo_full}#${ISSUE_NUMBER}"

          comment_body=$(echo "$comments_json" | jq -r --arg marker "$owned_artifact_marker" '
            (map(select(.body | contains($marker))) + map(select(.body | test("(^|\\n)#{1,2}\\s+Implementation Plan"))))
            | .[0].body // ""
          ')

          {
            echo 'plan_body<<EOF'
            printf '%s\n' "$comment_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check out execution branch
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        env:
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          GH_TOKEN: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          default_branch=$(gh repo view "${GITHUB_REPOSITORY}" --json defaultBranchRef --jq '.defaultBranchRef.name')
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            echo "::notice::Remote branch '$BRANCH_NAME' does not exist yet; creating local branch from '$default_branch'"
            git fetch origin "$default_branch"
            git checkout -B "$BRANCH_NAME" "origin/$default_branch"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare Codex execution prompt
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-author-prompt
        env:
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          PLAN_BODY: ${{ steps.execution-plan-source.outputs.plan_body }}
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          FEEDBACK_BODY: ${{ needs.intake.outputs.feedback_body }}
          FEEDBACK_SOURCE: ${{ needs.intake.outputs.feedback_source }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/execution-author-prompt.md"
          python3 scripts/build_orchestration_prompt.py execution-author --output "$prompt_file"
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex implement execution slice
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: codex-execution
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.execution-author-prompt.outputs.prompt_file }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Commit and push execution changes
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-commit
        env:
          BRANCH_NAME: ${{ steps.scaffold-execution.outputs.branch_name }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          GH_TOKEN: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "::error::Execution agent did not produce any file changes"
            exit 1
          fi

          rm -rf .codex || true
          git rm -r --cached --ignore-unmatch .codex >/dev/null 2>&1 || true
          git add -A
          if git diff --cached --quiet; then
            echo "::error::Execution agent changes could not be staged"
            exit 1
          fi

          git commit -m "feat: implement issue #${ISSUE_NUMBER} execution slice"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH_NAME}"

      - name: Create or recover execution PR (post-agent)
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: execution-pr
        uses: ./.github/actions/scaffold-execution
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}
          create_pr: 'true'

      - name: Mark PR ready for review
        if: (needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation') && steps.execution-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.execution-pr.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail
          is_draft=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')
          if [ "$is_draft" = "true" ]; then
            gh pr ready "$PR_NUMBER"
            echo "::notice::Marked PR #$PR_NUMBER ready for review"
          else
            echo "::notice::PR #$PR_NUMBER already ready for review"
          fi

      - name: Load post-execution PR state
        if: needs.intake.outputs.requested_stage == 'execution' || needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: post-execution-pr-state
        env:
          GH_TOKEN: ${{ steps.execution-app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,headRefName,headRefOid,updatedAt --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))] | sort_by(.updatedAt) | reverse | .[0]" 2>/dev/null || echo '')
          current_pr_sha=$(echo "$pr_json" | jq -r '.headRefOid // empty' 2>/dev/null || true)
          echo "current_pr_sha=$current_pr_sha" >> "$GITHUB_OUTPUT"

      - name: Detect feedback implementation progress
        if: needs.intake.outputs.requested_stage == 'feedback-implementation'
        id: feedback-progress
        env:
          START_SHA: ${{ steps.feedback-loop-context.outputs.current_pr_sha }}
          LAST_REVIEWED_SHA: ${{ steps.feedback-loop-context.outputs.last_reviewed_sha }}
          END_SHA: ${{ steps.post-execution-pr-state.outputs.current_pr_sha }}
        shell: bash
        run: |
          set -euo pipefail

          no_progress="false"
          if [ -n "${START_SHA:-}" ] && [ -n "${LAST_REVIEWED_SHA:-}" ] && [ -n "${END_SHA:-}" ] && \
             [ "$START_SHA" = "$LAST_REVIEWED_SHA" ] && [ "$END_SHA" = "$LAST_REVIEWED_SHA" ]; then
            no_progress="true"
            echo "::warning::Feedback implementation made no progress relative to the last reviewed PR head SHA ($LAST_REVIEWED_SHA)"
          fi

          echo "no_progress=$no_progress" >> "$GITHUB_OUTPUT"

      - name: Load agent review PR context
        if: needs.intake.outputs.requested_stage == 'agent-review'
        id: agent-review-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,title,url,body,headRefName,headRefOid,files,additions,deletions,changedFiles --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))][0]")
          pr_number=$(echo "$pr_json" | jq -r '.number // empty')
          if [ -z "$pr_number" ]; then
            echo "::error::No open PR found for issue #$ISSUE_NUMBER to review"
            exit 1
          fi

          pr_body=$(echo "$pr_json" | jq -r '.body // ""')
          pr_url=$(echo "$pr_json" | jq -r '.url // ""')
          pr_title=$(echo "$pr_json" | jq -r '.title // ""')
          pr_head_sha=$(echo "$pr_json" | jq -r '.headRefOid // ""')
          files_summary=$(echo "$pr_json" | jq -r '.files[]?.path // ""')
          diff_file="$RUNNER_TEMP/agent-review.diff"
          gh pr diff "$pr_number" --patch --color=never > "$diff_file"
          python3 - "$diff_file" <<'PY' > "$RUNNER_TEMP/agent-review-truncated.diff"
          from pathlib import Path
          import sys
          text = Path(sys.argv[1]).read_text()
          limit = 30000
          if len(text) > limit:
              text = text[:limit] + "\n\n[diff truncated]\n"
          print(text, end="")
          PY

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          {
            echo 'pr_body<<EOF'
            printf '%s\n' "$pr_body"
            echo 'EOF'
            echo 'pr_url<<EOF'
            printf '%s\n' "$pr_url"
            echo 'EOF'
            echo 'pr_title<<EOF'
            printf '%s\n' "$pr_title"
            echo 'EOF'
            echo 'pr_head_sha<<EOF'
            printf '%s\n' "$pr_head_sha"
            echo 'EOF'
            echo 'files_summary<<EOF'
            printf '%s\n' "$files_summary"
            echo 'EOF'
            echo 'diff_file<<EOF'
            printf '%s\n' "$RUNNER_TEMP/agent-review-truncated.diff"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Codex agent review prompt
        if: needs.intake.outputs.requested_stage == 'agent-review'
        id: agent-review-prompt
        env:
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          PR_NUMBER: ${{ steps.agent-review-context.outputs.pr_number }}
          PR_TITLE: ${{ steps.agent-review-context.outputs.pr_title }}
          PR_URL: ${{ steps.agent-review-context.outputs.pr_url }}
          PR_BODY: ${{ steps.agent-review-context.outputs.pr_body }}
          FILES_SUMMARY: ${{ steps.agent-review-context.outputs.files_summary }}
          DIFF_FILE: ${{ steps.agent-review-context.outputs.diff_file }}
          REVIEW_FILE: .gpa-agent-review.md
        shell: bash
        run: |
          set -euo pipefail
          prompt_file="$RUNNER_TEMP/agent-review-prompt.md"
          python3 scripts/build_orchestration_prompt.py agent-review --output "$prompt_file"
          {
            echo 'prompt<<EOF'
            cat "$prompt_file"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex agent review
        if: needs.intake.outputs.requested_stage == 'agent-review'
        id: codex-agent-review
        uses: openai/codex-action@v1
        with:
          prompt: ${{ steps.agent-review-prompt.outputs.prompt }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Parse agent review result
        if: needs.intake.outputs.requested_stage == 'agent-review'
        id: parse-agent-review
        env:
          REVIEW_FILE: .gpa-agent-review.md
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$REVIEW_FILE" ]; then
            echo "::error::Agent review did not produce $REVIEW_FILE"
            exit 1
          fi

          artifact_payload_json=$(python3 - "$REVIEW_FILE" <<'PY'
          import json, re, sys
          from pathlib import Path
          text = Path(sys.argv[1]).read_text()
          matches = re.findall(r'<!--\s*gpa:artifact-payload:(.*?)-->', text, flags=re.DOTALL)
          if not matches:
              print("")
              raise SystemExit(0)
          # Use the last payload if multiple are present.
          payload = matches[-1].strip()
          try:
              obj = json.loads(payload)
          except json.JSONDecodeError:
              print("INVALID_JSON")
              raise SystemExit(0)
          print(json.dumps(obj, separators=(",", ":")))
          PY
          )

          if [ "$artifact_payload_json" = "INVALID_JSON" ]; then
            echo "::error::Invalid JSON in gpa:artifact-payload envelope"
            exit 1
          fi

          if [ -n "$artifact_payload_json" ]; then
            payload_kind=$(echo "$artifact_payload_json" | jq -r '.kind // ""')
            payload_version=$(echo "$artifact_payload_json" | jq -r '.version // ""')
            payload_stage=$(echo "$artifact_payload_json" | jq -r '.stage // ""')
            disposition=$(echo "$artifact_payload_json" | jq -r '.data.disposition // ""')
            next_stage=$(echo "$artifact_payload_json" | jq -r '.data.decision.next_stage // ""')
            reason_codes_json=$(echo "$artifact_payload_json" | jq -c '.data.decision.reason_codes // []')

            if [ "$payload_kind" != "artifact_payload" ] || [ "$payload_version" != "gpa.v1" ] || [ "$payload_stage" != "agent-review" ]; then
              echo "::error::Invalid gpa:artifact-payload envelope identity (kind/version/stage)"
              exit 1
            fi
            if [ "$reason_codes_json" = "[]" ]; then
              echo "::error::gpa:artifact-payload decision.reason_codes must be non-empty"
              exit 1
            fi
          else
            echo "::warning::Legacy agent-review format detected (sentinel/heading parsing); canonical artifact payload missing"
            disposition=$(sed -n '1s/^gpa:agent-review://p' "$REVIEW_FILE" | tr -d '\r')
            next_stage=""
            reason_codes_json='[]'
          fi

          summary=$(awk '
            BEGIN {section=0}
            /^## Summary[[:space:]]*$/ {section=1; next}
            /^## Feedback[[:space:]]*$/ {section=0; exit}
            section==1 {print}
          ' "$REVIEW_FILE")
          feedback_markdown=$(awk '
            BEGIN {section=0}
            /^## Feedback[[:space:]]*$/ {section=1; next}
            section==1 {print}
          ' "$REVIEW_FILE")

          case "$disposition" in
            auto-approve)
              default_next_stage="merge"
              default_reason_codes='["agent_review_auto_approve"]'
              ;;
            rework-required)
              default_next_stage="feedback-implementation"
              default_reason_codes='["agent_review_rework_required"]'
              ;;
            operator-review-required)
              default_next_stage="deploy-review"
              default_reason_codes='["agent_review_operator_review_required"]'
              ;;
            *)
              echo "::error::Invalid agent review disposition: '$disposition'"
              cat "$REVIEW_FILE"
              exit 1
              ;;
          esac

          if [ -z "${next_stage:-}" ]; then
            next_stage="$default_next_stage"
          fi
          if [ "${reason_codes_json:-[]}" = "[]" ]; then
            reason_codes_json="$default_reason_codes"
          fi

          case "$next_stage" in
            merge|feedback-implementation|deploy-review) ;;
            *)
              echo "::error::Invalid next stage '$next_stage' in agent-review payload"
              exit 1
              ;;
          esac

          {
            echo "disposition=$disposition"
            echo "next_stage=$next_stage"
            echo "reason_codes=$reason_codes_json"
            echo 'summary<<EOF'
            printf '%s\n' "$summary"
            echo 'EOF'
            echo 'feedback_body<<EOF'
            printf '%s\n' "$feedback_markdown"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish agent review summary
        if: needs.intake.outputs.requested_stage == 'agent-review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          PR_NUMBER: ${{ steps.agent-review-context.outputs.pr_number }}
          PR_URL: ${{ steps.agent-review-context.outputs.pr_url }}
          PR_HEAD_SHA: ${{ steps.agent-review-context.outputs.pr_head_sha }}
          DISPOSITION: ${{ steps.parse-agent-review.outputs.disposition }}
          NEXT_STAGE: ${{ steps.parse-agent-review.outputs.next_stage }}
          REASON_CODES: ${{ steps.parse-agent-review.outputs.reason_codes }}
          SUMMARY: ${{ steps.parse-agent-review.outputs.summary }}
          FEEDBACK_BODY: ${{ steps.parse-agent-review.outputs.feedback_body }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NEXT_STAGE:-}" ]; then
            echo "::error::Missing NEXT_STAGE from parsed agent review result"
            exit 1
          fi

          checkpoint=$(jq -cn \
            --arg run_key "$RUN_KEY" \
            --arg stage "agent-review" \
            --arg state "completed" \
            --arg actor "$ACTOR" \
            --arg disposition "$DISPOSITION" \
            --arg artifact_ref "pr:$PR_NUMBER" \
            --arg pr_head_sha "$PR_HEAD_SHA" \
            --arg next_stage "$NEXT_STAGE" \
            '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,disposition:$disposition,artifact_ref:$artifact_ref,pr_head_sha:$pr_head_sha,next_stage:$next_stage}')

          canonical_checkpoint=$(jq -cn \
            --arg run_key "$RUN_KEY" \
            --arg actor "$ACTOR" \
            --arg disposition "$DISPOSITION" \
            --arg artifact_ref "pr:$PR_NUMBER" \
            --arg pr_head_sha "$PR_HEAD_SHA" \
            --arg next_stage "$NEXT_STAGE" \
            --argjson reason_codes "${REASON_CODES:-[]}" \
            '{
              kind:"checkpoint",
              version:"gpa.v1",
              run_key:$run_key,
              stage:{name:"agent-review",status:"completed",actor:$actor},
              decision:{next_stage:$next_stage,reason_codes:$reason_codes},
              artifact:{ref:$artifact_ref},
              data:{disposition:$disposition,pr_head_sha:$pr_head_sha}
            }')

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Agent review
          <!-- gpa:run-status:agent-review:completed:$RUN_KEY -->
          <!-- gpa:checkpoint-v1 $canonical_checkpoint -->
          <!-- gpa:checkpoint $checkpoint -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **PR** | $PR_URL |
          | **PR head SHA** | \`$PR_HEAD_SHA\` |
          | **Disposition** | \`$DISPOSITION\` |

          $SUMMARY

          $FEEDBACK_BODY
          COMMENT_EOF
          )"

      - name: Auto-approve PR review
        if: needs.intake.outputs.requested_stage == 'agent-review' && steps.parse-agent-review.outputs.disposition == 'auto-approve'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.agent-review-context.outputs.pr_number }}
          SUMMARY: ${{ steps.parse-agent-review.outputs.summary }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr review "$PR_NUMBER" --approve -b "Automated agent review: $SUMMARY" || \
            echo "::warning::Could not submit GitHub approval review for PR #$PR_NUMBER"

      - name: Clean up agent review artifact
        if: needs.intake.outputs.requested_stage == 'agent-review'
        shell: bash
        run: rm -f .gpa-agent-review.md

      - name: Publish review-ready summary
        if: needs.intake.outputs.requested_stage == 'deploy-review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,isDraft,url,headRefName,body --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))][0]")
          pr_number=$(echo "$pr_json" | jq -r '.number // empty')
          pr_url=$(echo "$pr_json" | jq -r '.url // empty')
          branch_name=$(echo "$pr_json" | jq -r '.headRefName // empty')
          deployment_url=$(printf '%s' "$(echo "$pr_json" | jq -r '.body // ""')" | grep -oE 'https://[^[:space:])]+' || true)
          deployment_url=${deployment_url:-"(deployment URL not yet wired)"}
          checkpoint=$(jq -cn \
            --arg run_key "$RUN_KEY" \
            --arg stage "deploy-review" \
            --arg state "completed" \
            --arg actor "$ACTOR" \
            --arg artifact_ref "pr:$pr_number" \
            --arg branch "$branch_name" \
            --arg deployment_url "$deployment_url" \
            '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,artifact_ref:$artifact_ref,branch:$branch,deployment_url:$deployment_url,next_stage:""}')
          export PR_URL="$pr_url"
          export BRANCH_NAME="$branch_name"
          export DEPLOYMENT_URL="$deployment_url"
          export CHECKPOINT="$checkpoint"
          gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py deploy-review-ready)"

      # For the closeout stage, enforce pre-scaffold prerequisites BEFORE
      # scaffolding. This preserves the same pre-scaffold/full-gate sequence that
      # earlier standalone closeout handling used:
      # pre-scaffold gate (merged PR, branch deleted, follow-ups) → scaffold →
      # full gate (content checks). Without this, the orchestration path could
      # post a closeout retrospective on an issue that hasn't met prerequisites.
      - name: Pre-scaffold gate check (closeout)
        if: needs.intake.outputs.requested_stage == 'closeout'
        id: closeout-pre-gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          requested_stage: closeout
          issue_body: ${{ needs.intake.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_mode: pre-scaffold

      - name: Post closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.closeout-pre-gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- :x: \(.)"' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- :fast_forward: \(.)"' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Orchestration run — closeout pre-scaffold gate failed
          <!-- gpa:run-status:$REQUESTED_STAGE:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Requested stage** | \`$REQUESTED_STAGE\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Prerequisites not met — scaffold not posted |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet prerequisites:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          Resolve the unmet prerequisites and re-trigger.
          COMMENT_EOF
          )"

      - name: Fail on closeout pre-scaffold gate failure
        if: steps.closeout-pre-gate.outputs.gate_passed == 'false'
        env:
          UNMET: ${{ steps.closeout-pre-gate.outputs.unmet_conditions }}
        shell: bash
        run: |
          echo "::error::Closeout pre-scaffold gate failed. Unmet prerequisites: $UNMET"
          exit 1

      - name: Scaffold closeout retrospective (pre-gate)
        if: needs.intake.outputs.requested_stage == 'closeout' && steps.closeout-pre-gate.outputs.gate_passed != 'false'
        id: scaffold-closeout
        uses: ./.github/actions/scaffold-closeout
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

      - name: Refresh issue body
        id: issue-body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          body=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          {
            echo 'body<<EOF'
            printf '%s\n' "$body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check gate conditions
        id: gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          requested_stage: ${{ needs.intake.outputs.requested_stage == 'feedback-implementation' && 'execution' || needs.intake.outputs.requested_stage }}
          issue_body: ${{ steps.issue-body.outputs.body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trust_policy_path: config/trust-policy.yml

      - name: Post gate failure comment
        if: steps.gate.outputs.gate_passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "- (none)")
          checkpoint=$(jq -cn \
            --arg run_key "$RUN_KEY" \
            --arg stage "$REQUESTED_STAGE" \
            --arg state "failed" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            --argjson unmet "${UNMET:-[]}" \
            --argjson waived "${WAIVED:-[]}" \
            '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,run_url:$run_url,unmet_conditions:$unmet,waived_conditions:$waived}')
          export UNMET_LIST="$unmet_list"
          export WAIVED_LIST="$waived_list"
          export CHECKPOINT="$checkpoint"
          gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py gate-failed)"

      - name: Fail on gate not passed
        if: steps.gate.outputs.gate_passed != 'true'
        env:
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        shell: bash
        run: |
          echo "::error::Gate conditions not met for stage '$REQUESTED_STAGE'"
          exit 1

      - name: Verify current state unchanged
        id: state-check
        if: steps.gate.outputs.gate_passed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
        run: |
          # §Idempotency — Manual path dedup obligations, rule 2: current-state check
          # Verify the issue hasn't changed since the run started (still open, no
          # do-not-automate label added). Posts a mismatch comment per contract.
          issue_json=$(gh issue view "$ISSUE_NUMBER" --json state,labels 2>/dev/null || echo '{}')
          issue_state=$(echo "$issue_json" | jq -r '.state // "UNKNOWN"')
          has_block_label=$(echo "$issue_json" | jq -r '.labels[]? | select(.name == "do-not-automate") | .name' || true)

          mismatch=""
          if [ "$issue_state" = "CLOSED" ]; then
            mismatch="Issue #$ISSUE_NUMBER was closed between eligibility check and gate pass"
          elif [ -n "$has_block_label" ]; then
            mismatch="Issue #$ISSUE_NUMBER had do-not-automate label added between eligibility check and gate pass"
          fi

          if [ -n "$mismatch" ]; then
            echo "::error::$mismatch"
            export REASON="$mismatch"
            gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py state-mismatch)"
            echo "state_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "state_valid=true" >> "$GITHUB_OUTPUT"

      - name: Create orchestration app token (merge sync)
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && vars.ORCHESTRATION_APP_ID != ''
        id: merge-sync-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Sync feature branch with main (pre-merge)
        id: merge-sync
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.merge-sync-token.outputs.token }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,headRefName,baseRefName --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))][0]")
          pr_number=$(echo "$pr_json" | jq -r '.number // empty')
          branch_name=$(echo "$pr_json" | jq -r '.headRefName // empty')
          base_ref=$(echo "$pr_json" | jq -r '.baseRefName // "main"')

          if [ -z "$pr_number" ] || [ -z "$branch_name" ]; then
            echo "::error::No open PR found for issue #$ISSUE_NUMBER to sync before merge"
            exit 1
          fi

          {
            echo "pr_number=$pr_number"
            echo "branch_name=$branch_name"
            echo "base_ref=$base_ref"
          } >> "$GITHUB_OUTPUT"

          git config user.name "project-automation-gateway[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

          git fetch origin "$base_ref" "$branch_name"
          git checkout -B "$branch_name" "origin/$branch_name"

          if git merge --no-edit "origin/$base_ref"; then
            rm -rf .codex || true
            git rm -r --cached --ignore-unmatch .codex >/dev/null 2>&1 || true
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit --amend --no-edit
            fi
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$branch_name")" ]; then
              git push origin "HEAD:$branch_name"
              echo "::notice::Synced $branch_name with $base_ref before merge"
              echo "sync_result=updated" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::Branch $branch_name already included $base_ref"
              echo "sync_result=unchanged" >> "$GITHUB_OUTPUT"
            fi
          else
            conflict_files=$(git diff --name-only --diff-filter=U || true)
            echo "::warning::Automatic merge sync from $base_ref into $branch_name requires manual conflict resolution"
            echo "sync_result=conflict" >> "$GITHUB_OUTPUT"
            {
              echo 'conflict_files<<EOF'
              printf '%s\n' "$conflict_files"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate merge conflict resolution credentials
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Merge conflict resolution requires secrets.OPENAI_API_KEY"; exit 1; }

      - name: Prepare merge conflict resolution prompt
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict'
        id: merge-conflict-prompt
        env:
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.intake.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.intake.outputs.issue_body }}
          PR_NUMBER: ${{ steps.merge-sync.outputs.pr_number }}
          BRANCH_NAME: ${{ steps.merge-sync.outputs.branch_name }}
          BASE_REF: ${{ steps.merge-sync.outputs.base_ref }}
          CONFLICT_FILES: ${{ steps.merge-sync.outputs.conflict_files }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/merge-conflict-resolution-prompt.md"
          python3 scripts/build_orchestration_prompt.py merge-conflict --output "$prompt_file"
          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Codex resolve merge conflicts
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict'
        id: codex-merge-conflicts
        uses: openai/codex-action@v1
        with:
          prompt-file: ${{ steps.merge-conflict-prompt.outputs.prompt_file }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          model: ${{ vars.ORCHESTRATION_CODEX_MODEL }}
          effort: ${{ vars.ORCHESTRATION_CODEX_EFFORT }}
          allow-bots: true

      - name: Commit and push resolved merge sync
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict'
        id: merge-conflict-resolution
        env:
          GH_TOKEN: ${{ steps.merge-sync-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ steps.merge-sync.outputs.branch_name }}
        shell: bash
        run: |
          set -euo pipefail

          unmerged_files=$(git diff --name-only --diff-filter=U || true)
          if [ -n "$unmerged_files" ]; then
            {
              echo "resolution_result=unresolved"
              echo 'remaining_conflicts<<EOF'
              printf '%s\n' "$unmerged_files"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo "::warning::Merge conflicts remain after automated resolution attempt"
            exit 0
          fi

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            echo "resolution_result=unresolved" >> "$GITHUB_OUTPUT"
            echo "::warning::Merge conflict resolution did not leave a merge in progress"
            exit 0
          fi

          rm -rf .codex || true
          git rm -r --cached --ignore-unmatch .codex >/dev/null 2>&1 || true
          git add -A
          git commit --no-edit
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${BRANCH_NAME}"
          echo "resolution_result=resolved" >> "$GITHUB_OUTPUT"
          echo "::notice::Automated merge conflict resolution committed and pushed"

      - name: Post merge remediation required comment
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict' && steps.merge-conflict-resolution.outputs.resolution_result != 'resolved'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          checkpoint=$(jq -cn \
            --arg run_key "$RUN_KEY" \
            --arg stage "merge" \
            --arg state "blocked" \
            --arg actor "$ACTOR" \
            --arg reason "merge-sync-conflict" \
            --arg run_url "$RUN_URL" \
            '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,reason:$reason,run_url:$run_url,next_stage:"deploy-review"}')
          export CHECKPOINT="$checkpoint"
          gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py merge-remediation)"

      - name: Fail on merge sync conflict
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && steps.merge-sync.outputs.sync_result == 'conflict' && steps.merge-conflict-resolution.outputs.resolution_result != 'resolved'
        shell: bash
        run: |
          echo "::error::Automatic pre-merge sync with main still has unresolved conflicts after remediation attempt"
          exit 1

      - name: Merge approved PR (post-gate)
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'merge' && (steps.merge-sync.outputs.sync_result != 'conflict' || steps.merge-conflict-resolution.outputs.resolution_result == 'resolved')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state open --json number,isDraft,url,headRefName --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))][0]")
          pr_number=$(echo "$pr_json" | jq -r '.number // empty')

          if [ -z "$pr_number" ]; then
            echo "::error::No open PR found for issue #$ISSUE_NUMBER to merge"
            exit 1
          fi

          gh pr merge "$pr_number" --squash --delete-branch
          echo "::notice::Merged PR #$pr_number and deleted its branch"

      - name: Post success comment
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          WAIVED: ${{ needs.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- " + .' 2>/dev/null || echo "")
          waived_section=""
          if [ -n "$waived_list" ]; then
            waived_section="
          **Waived conditions:**
          $waived_list"
          fi

          checkpoint_line=""
          canonical_checkpoint_line=""
          case "$REQUESTED_STAGE" in
            agent-review|deploy-review)
              ;;
            *)
              next_stage=""
              case "$REQUESTED_STAGE" in
                kickoff) next_stage="clarification" ;;
                clarification) next_stage="design" ;;
                design) next_stage="plan" ;;
                plan) next_stage="execution" ;;
                execution) next_stage="agent-review" ;;
                feedback-implementation)
                  # feedback-implementation can fan out based on the source/progress;
                  # leave next_stage unresolved here and let handoff decide.
                  next_stage=""
                  ;;
                merge) next_stage="follow-up-capture" ;;
                follow-up-capture) next_stage="closeout" ;;
                closeout) next_stage="" ;;
              esac

              reason_codes='["stage_gate_passed"]'
              if [ -n "$next_stage" ]; then
                reason_codes='["stage_gate_passed","stage_handoff_queued"]'
              fi

              checkpoint=$(jq -cn \
                --arg run_key "$RUN_KEY" \
                --arg stage "$REQUESTED_STAGE" \
                --arg state "completed" \
                --arg actor "$ACTOR" \
                --arg run_url "$RUN_URL" \
                --arg next_stage "$next_stage" \
                --argjson waived "${WAIVED:-[]}" \
                '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,run_url:$run_url,next_stage:$next_stage,waived_conditions:$waived}')

              canonical_checkpoint=$(jq -cn \
                --arg run_key "$RUN_KEY" \
                --arg stage "$REQUESTED_STAGE" \
                --arg actor "$ACTOR" \
                --arg run_url "$RUN_URL" \
                --arg next_stage "$next_stage" \
                --argjson reason_codes "$reason_codes" \
                --argjson waived "${WAIVED:-[]}" \
                '{
                  kind:"checkpoint",
                  version:"gpa.v1",
                  run_key:$run_key,
                  stage:{name:$stage,status:"completed",actor:$actor},
                  decision:{next_stage:$next_stage,reason_codes:$reason_codes},
                  data:{run_url:$run_url,waived_conditions:$waived}
                }')

              checkpoint_line="<!-- gpa:checkpoint $checkpoint -->"
              canonical_checkpoint_line="<!-- gpa:checkpoint-v1 $canonical_checkpoint -->"
              ;;
          esac
          export CANONICAL_CHECKPOINT_LINE="$canonical_checkpoint_line"
          export CHECKPOINT_LINE="$checkpoint_line"
          export WAIVED_SECTION="$waived_section"
          gh issue comment "$ISSUE_NUMBER" --body "$(python3 scripts/render_orchestration_comment.py stage-transition)"

      # Post-gate action: capture follow-ups after gate confirms markers exist
      # and execution is complete. Unlike pre-gate scaffolds, this runs AFTER
      # the gate passes because it creates external artifacts (new issues).
      - name: Capture follow-ups (post-gate)
        if: steps.gate.outputs.gate_passed == 'true' && steps.state-check.outputs.state_valid == 'true' && needs.intake.outputs.requested_stage == 'follow-up-capture'
        id: capture-follow-ups
        uses: ./.github/actions/capture-follow-ups
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ needs.intake.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}

  # ── handoff ─────────────────────────────────────────────────────────
  # Queue the next stage when the current one completes successfully.
  handoff:
    needs: [intake, gate]
    if: needs.intake.outputs.duplicate != 'true' && needs.gate.outputs.gate_passed == 'true' && needs.gate.outputs.state_valid == 'true'
    runs-on: ubuntu-latest
    outputs:
      next_stage: ${{ steps.resolve.outputs.next_stage }}
      target_status: ${{ steps.resolve.outputs.target_status }}
      next_run_key: ${{ steps.next-run-key.outputs.run_key }}
      status_updated: ${{ steps.sync-status.outputs.updated }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - name: Create orchestration app token
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ORCHESTRATION_APP_ID }}
          private-key: ${{ secrets.ORCHESTRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-organization-projects: write

      - name: Resolve next stage
        id: resolve
        shell: bash
        env:
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          REVIEW_DISPOSITION: ${{ needs.gate.outputs.review_disposition }}
          REVIEW_NEXT_STAGE: ${{ needs.gate.outputs.review_next_stage }}
          FEEDBACK_SOURCE: ${{ needs.intake.outputs.feedback_source }}
          FEEDBACK_NO_PROGRESS: ${{ needs.gate.outputs.feedback_no_progress }}
        run: |
          case "$REQUESTED_STAGE" in
            kickoff)
              next_stage="clarification"
              target_status="In Progress"
              ;;
            clarification)
              next_stage="design"
              target_status="In Progress"
              ;;
            design)
              next_stage="plan"
              target_status="In Progress"
              ;;
            plan)
              next_stage="execution"
              target_status="In Progress"
              ;;
            execution)
              next_stage="agent-review"
              target_status="In Progress"
              ;;
            agent-review)
              if [ -n "${REVIEW_NEXT_STAGE:-}" ]; then
                next_stage="$REVIEW_NEXT_STAGE"
                case "$next_stage" in
                  merge|feedback-implementation)
                    target_status="In Progress"
                    ;;
                  deploy-review)
                    target_status="In Review"
                    ;;
                  *)
                    echo "::error::Unknown review_next_stage '$next_stage' for agent-review"
                    exit 1
                    ;;
                esac
              else
                echo "::warning::Missing canonical review next-stage; falling back to disposition mapping"
                case "$REVIEW_DISPOSITION" in
                  auto-approve)
                    next_stage="merge"
                    target_status="In Progress"
                    ;;
                  rework-required)
                    next_stage="feedback-implementation"
                    target_status="In Progress"
                    ;;
                  operator-review-required)
                    next_stage="deploy-review"
                    target_status="In Review"
                    ;;
                  *)
                    echo "::error::Unknown or missing review disposition '$REVIEW_DISPOSITION' for agent-review"
                    exit 1
                    ;;
                esac
              fi
              ;;
            deploy-review)
              next_stage=""
              target_status="In Review"
              ;;
            feedback-implementation)
              if [ "$FEEDBACK_SOURCE" = "operator" ]; then
                next_stage="deploy-review"
                target_status="In Review"
              elif [ "$FEEDBACK_NO_PROGRESS" = "true" ]; then
                next_stage="deploy-review"
                target_status="In Review"
              else
                next_stage="agent-review"
                target_status="In Progress"
              fi
              ;;
            merge)
              next_stage="follow-up-capture"
              target_status="In Progress"
              ;;
            follow-up-capture)
              next_stage="closeout"
              target_status="In Progress"
              ;;
            closeout)
              next_stage=""
              target_status="Done"
              ;;
            *)
              echo "::error::Unknown requested_stage '$REQUESTED_STAGE'"
              exit 1
              ;;
          esac

          echo "next_stage=$next_stage" >> "$GITHUB_OUTPUT"
          echo "target_status=$target_status" >> "$GITHUB_OUTPUT"

      - name: Sync project Status
        if: needs.intake.outputs.project_item_id != '' && steps.app-token.outcome == 'success'
        id: sync-status
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ITEM_ID: ${{ needs.intake.outputs.project_item_id }}
          TARGET_STATUS: ${{ steps.resolve.outputs.target_status }}
        run: |
          set -euo pipefail
          sync_result=$(python3 scripts/sync_project_status.py --item-id "$PROJECT_ITEM_ID" --target-status "$TARGET_STATUS")
          updated=$(echo "$sync_result" | jq -r '.updated')
          current_status=$(echo "$sync_result" | jq -r '.current_status // ""')
          if [ "$updated" = "true" ]; then
            echo "::notice::Updated project Status to '$TARGET_STATUS'"
          else
            echo "::notice::Project Status already '$TARGET_STATUS' (current: '${current_status:-}')"
          fi
          echo "updated=$updated" >> "$GITHUB_OUTPUT"

      - name: Skip project Status sync
        if: needs.intake.outputs.project_item_id == ''
        shell: bash
        run: |
          echo "::notice::No project_item_id provided; skipping project Status sync"

      - name: Fail if app credentials are unavailable for closed-loop sync
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID == ''
        shell: bash
        run: |
          echo "::error::Closed-loop project synchronization requires vars.ORCHESTRATION_APP_ID to be available to this repository"
          exit 1

      - name: Fail if app token could not be created for closed-loop sync
        if: needs.intake.outputs.project_item_id != '' && vars.ORCHESTRATION_APP_ID != '' && steps.app-token.outcome != 'success'
        shell: bash
        run: |
          echo "::error::Closed-loop project synchronization requires GitHub App credentials in Actions: vars.ORCHESTRATION_APP_ID and secrets.ORCHESTRATION_APP_PRIVATE_KEY"
          exit 1

      - name: Generate next run key
        if: steps.resolve.outputs.next_stage != '' && steps.app-token.outcome == 'success'
        id: next-run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
        run: |
          timestamp=$(date +%s%3N)
          run_key="${REPO_NAME}/${ISSUE_NUMBER}/${NEXT_STAGE}/${timestamp}"
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"

      - name: Dispatch next stage
        if: steps.resolve.outputs.next_stage != '' && needs.intake.outputs.project_item_id != '' && steps.app-token.outcome == 'success'
        id: dispatch
        uses: ./.github/actions/dispatch-orchestration
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          issue_number: ${{ needs.intake.outputs.issue_number }}
          requested_stage: ${{ steps.resolve.outputs.next_stage }}
          run_key: ${{ steps.next-run-key.outputs.run_key }}
          actor: ${{ needs.intake.outputs.actor }}
          timestamp: ${{ steps.next-run-key.outputs.timestamp }}
          issue_title: ${{ needs.intake.outputs.issue_title }}
          project_item_id: ${{ needs.intake.outputs.project_item_id }}
          feedback_source: ${{ steps.resolve.outputs.next_stage == 'feedback-implementation' && 'agent' || needs.intake.outputs.feedback_source }}
          feedback_body: ${{ steps.resolve.outputs.next_stage == 'feedback-implementation' && needs.gate.outputs.review_feedback_body || needs.intake.outputs.feedback_body }}

      - name: Post next-stage queued comment
        if: steps.dispatch.outputs.dispatched == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          NEXT_STAGE: ${{ steps.resolve.outputs.next_stage }}
          NEXT_RUN_KEY: ${{ steps.next-run-key.outputs.run_key }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          checkpoint=$(jq -cn \
            --arg run_key "$NEXT_RUN_KEY" \
            --arg stage "$NEXT_STAGE" \
            --arg state "started" \
            --arg actor "$ACTOR" \
            --arg parent_run_url "$RUN_URL" \
            '{run_key:$run_key,stage:$stage,state:$state,actor:$actor,parent_run_url:$parent_run_url}')
          export CHECKPOINT="$checkpoint"
          gh issue comment "$ISSUE_NUMBER" -R "$GITHUB_REPOSITORY" --body "$(python3 scripts/render_orchestration_comment.py next-stage-queued)"

      - name: Skip next-stage dispatch without project item context
        if: steps.resolve.outputs.next_stage != '' && needs.intake.outputs.project_item_id == ''
        shell: bash
        run: |
          echo "::notice::No project_item_id provided; skipping automatic next-stage dispatch"

      - name: Record terminal stage
        if: steps.resolve.outputs.next_stage == ''
        shell: bash
        run: |
          echo "::notice::Current stage is terminal; no next stage will be queued"

  # ── summary ─────────────────────────────────────────────────────────
  # Always-runs job that produces the Actions job summary.
  summary:
    needs: [intake, gate, handoff]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Query run history
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ needs.intake.outputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load summary PR context
        id: summary-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json=$(gh pr list --state all --json number,url,headRefName,updatedAt --limit 100 \
            --jq "[.[] | select(.headRefName | test(\"^${ISSUE_NUMBER}[-/]\"))] | sort_by(.updatedAt) | reverse | .[0]" 2>/dev/null || echo '')
          pr_number=$(echo "$pr_json" | jq -r '.number // empty' 2>/dev/null || true)
          pr_url=$(echo "$pr_json" | jq -r '.url // empty' 2>/dev/null || true)
          pr_branch=$(echo "$pr_json" | jq -r '.headRefName // empty' 2>/dev/null || true)
          {
            echo "pr_number=$pr_number"
            echo "pr_url=$pr_url"
            echo "pr_branch=$pr_branch"
          } >> "$GITHUB_OUTPUT"

      - name: Job summary
        env:
          RUN_KEY: ${{ needs.intake.outputs.run_key }}
          ELIGIBLE: ${{ needs.intake.outputs.eligible }}
          DUPLICATE: ${{ needs.intake.outputs.duplicate }}
          GATE_PASSED: ${{ needs.gate.outputs.gate_passed }}
          ISSUE_NUMBER: ${{ needs.intake.outputs.issue_number }}
          REQUESTED_STAGE: ${{ needs.intake.outputs.requested_stage }}
          ACTOR: ${{ needs.intake.outputs.actor }}
          REPO: ${{ github.repository }}
          TRIGGER: ${{ needs.intake.outputs.trigger }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
          NEXT_STAGE: ${{ needs.handoff.outputs.next_stage }}
          TARGET_STATUS: ${{ needs.handoff.outputs.target_status }}
          STATUS_UPDATED: ${{ needs.handoff.outputs.status_updated }}
          HANDOFF_DISPATCHED: ${{ needs.handoff.outputs.dispatched }}
          NEXT_RUN_KEY: ${{ needs.handoff.outputs.next_run_key }}
          PR_NUMBER: ${{ steps.summary-pr.outputs.pr_number }}
          PR_URL: ${{ steps.summary-pr.outputs.pr_url }}
          PR_BRANCH: ${{ steps.summary-pr.outputs.pr_branch }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ISSUE_URL: ${{ github.server_url }}/${{ github.repository }}/issues/${{ needs.intake.outputs.issue_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          pr_value="n/a"
          branch_value="n/a"
          if [ -n "${PR_NUMBER:-}" ] && [ -n "${PR_URL:-}" ]; then
            pr_value="[#${PR_NUMBER}](${PR_URL})"
          fi
          if [ -n "${PR_BRANCH:-}" ]; then
            branch_value="\`${PR_BRANCH}\`"
          fi

          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          export PR_VALUE="$pr_value"
          export BRANCH_VALUE="$branch_value"
          export PREVIOUS_RUN_KEY="$previous_run_key"
          export PREVIOUS_RUN_URL="$previous_run_url"
          export PREVIOUS_RUN_VALUE="$previous_run_value"
          export CURRENT_STAGE="$REQUESTED_STAGE"

          scripts/render_orchestration_summary.sh >> "$GITHUB_STEP_SUMMARY"
