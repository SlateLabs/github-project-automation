name: Scaffold Implementation Plan

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to create an implementation plan comment for'
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          timestamp=$(date +%s%3N)
          run_key="${REPO_NAME}/${ISSUE_NUM}/plan-scaffold/${timestamp}"
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key"

      - name: Validate eligibility
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: plan
          actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Implementation plan scaffold — ineligible
          <!-- gpa:run-status:plan:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

      - name: Scaffold implementation plan
        if: steps.eligibility.outputs.eligible == 'true'
        id: scaffold
        uses: ./.github/actions/scaffold-impl-plan
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ github.actor }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          COMMENT_URL: ${{ steps.scaffold.outputs.comment_url }}
          CREATED: ${{ steps.scaffold.outputs.created }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          {
            echo "## Implementation Plan Scaffold Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Comment URL | ${COMMENT_URL:-n/a} |"
            echo "| Created | ${CREATED:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- Fill in the plan comment with substantive content for all headings"
            echo "- Ensure acceptance criteria, verification plan, and slices are populated"
            echo "- Re-trigger \`orchestration-dispatch\` with \`requested_stage: plan\` to pass the gate"
          } >> "$GITHUB_STEP_SUMMARY"
