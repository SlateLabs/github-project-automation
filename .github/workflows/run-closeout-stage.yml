name: Run Closeout Stage

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_body:
        required: true
        type: string
      run_key:
        required: true
        type: string
      actor:
        required: true
        type: string
    secrets:
      github_token:
        required: true

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  closeout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare closeout
        uses: ./.github/actions/prepare-closeout
        with:
          issue_number: ${{ inputs.issue_number }}
          issue_body: ${{ inputs.issue_body }}
          github_token: ${{ secrets.github_token }}
          run_key: ${{ inputs.run_key }}
          actor: ${{ inputs.actor }}
