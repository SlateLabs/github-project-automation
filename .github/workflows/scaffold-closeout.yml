name: Scaffold Closeout

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to post a closeout retrospective comment on'
        required: true
        type: number
      run_key:
        description: 'Optional existing run key to preserve correlation across wrapper workflows'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate run key
        id: run-key
        shell: bash
        env:
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          PROVIDED_RUN_KEY: ${{ inputs.run_key }}
        run: |
          if [ -n "${PROVIDED_RUN_KEY:-}" ]; then
            run_key="$PROVIDED_RUN_KEY"
          else
            timestamp=$(date +%s%3N)
            run_key="${REPO_NAME}/${ISSUE_NUM}/closeout/${timestamp}"
          fi
          echo "run_key=$run_key" >> "$GITHUB_OUTPUT"
          echo "::notice::Run key: $run_key"

      - name: Validate eligibility
        id: eligibility
        uses: ./.github/actions/validate-eligibility
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: closeout
          actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post ineligible comment
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          REASON: ${{ steps.eligibility.outputs.reason }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Closeout scaffold — ineligible
          <!-- gpa:run-status:closeout:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Ineligible |
          | **Reason** | $REASON |
          | **Actions run** | [$RUN_ID]($RUN_URL) |
          COMMENT_EOF
          )"

      - name: Fail on ineligible
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          REASON: ${{ steps.eligibility.outputs.reason }}
        shell: bash
        run: |
          echo "::error::Issue is not eligible: $REASON"
          exit 1

      - name: Pre-scaffold gate check
        if: steps.eligibility.outputs.eligible == 'true'
        id: pre-gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: closeout
          issue_body: ${{ steps.eligibility.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_mode: pre-scaffold

      - name: Post pre-scaffold gate failure comment
        if: steps.pre-gate.outputs.gate_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          UNMET: ${{ steps.pre-gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.pre-gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- :x: \(.)"' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- :fast_forward: \(.)"' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Closeout pre-scaffold gate — failed
          <!-- gpa:run-status:closeout:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Prerequisites not met — scaffold not posted |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet prerequisites:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          Resolve the unmet prerequisites and re-run the workflow.
          COMMENT_EOF
          )"

      - name: Fail on pre-scaffold gate failure
        if: steps.pre-gate.outputs.gate_passed == 'false'
        env:
          UNMET: ${{ steps.pre-gate.outputs.unmet_conditions }}
        shell: bash
        run: |
          echo "::error::Pre-scaffold gate failed. Unmet prerequisites: $UNMET"
          exit 1

      - name: Scaffold closeout
        if: steps.eligibility.outputs.eligible == 'true' && steps.pre-gate.outputs.gate_passed == 'true'
        id: scaffold
        uses: ./.github/actions/scaffold-closeout
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_key: ${{ steps.run-key.outputs.run_key }}
          actor: ${{ github.actor }}

      - name: Check closeout gate
        if: steps.eligibility.outputs.eligible == 'true' && steps.pre-gate.outputs.gate_passed == 'true' && steps.scaffold.outputs.created != ''
        id: gate
        uses: ./.github/actions/check-gate
        with:
          issue_number: ${{ inputs.issue_number }}
          requested_stage: closeout
          issue_body: ${{ steps.eligibility.outputs.issue_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post gate failure comment
        if: steps.gate.outputs.gate_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
          WAIVED: ${{ steps.gate.outputs.waived_conditions }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          # Format unmet conditions as markdown list
          unmet_list=$(echo "$UNMET" | jq -r '.[] | "- :x: \(.)"' 2>/dev/null || echo "- (none)")
          waived_list=$(echo "$WAIVED" | jq -r '.[] | "- :fast_forward: \(.)"' 2>/dev/null || echo "- (none)")

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
          ### Closeout gate — failed
          <!-- gpa:run-status:closeout:failed:$RUN_KEY -->

          | Field | Value |
          |-------|-------|
          | **Run key** | \`$RUN_KEY\` |
          | **Actor** | @$ACTOR |
          | **Result** | :x: Gate conditions not met |
          | **Actions run** | [$RUN_ID]($RUN_URL) |

          **Unmet conditions:**
          $unmet_list

          **Waived conditions:**
          $waived_list

          The closeout scaffold was created but the gate check did not pass.
          Resolve the unmet conditions and re-run the workflow, or post a \`GATE-WAIVER\` comment.
          COMMENT_EOF
          )"

      - name: Fail on gate failure
        if: steps.gate.outputs.gate_passed == 'false'
        env:
          UNMET: ${{ steps.gate.outputs.unmet_conditions }}
        shell: bash
        run: |
          echo "::error::Closeout gate failed. Unmet conditions: $UNMET"
          exit 1

      - name: Query run history
        if: always()
        id: run-history
        uses: ./.github/actions/query-run-history
        with:
          issue_number: ${{ inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          RUN_KEY: ${{ steps.run-key.outputs.run_key }}
          ELIGIBLE: ${{ steps.eligibility.outputs.eligible }}
          PRE_GATE_PASSED: ${{ steps.pre-gate.outputs.gate_passed }}
          CREATED: ${{ steps.scaffold.outputs.created }}
          GATE_PASSED: ${{ steps.gate.outputs.gate_passed }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_HISTORY: ${{ steps.run-history.outputs.run_history }}
        shell: bash
        run: |
          previous_run_key=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].run_key // ""')
          previous_run_url=$(echo "${RUN_HISTORY:-[]}" | jq -r --arg current_run_key "$RUN_KEY" 'map(select(.run_key != $current_run_key)) | .[0].comment_url // ""')
          if [ -n "$previous_run_key" ] && [ -n "$previous_run_url" ]; then
            previous_run_value="[$previous_run_key]($previous_run_url)"
          else
            previous_run_value="n/a"
          fi

          {
            echo "## Closeout Scaffold Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run key | \`$RUN_KEY\` |"
            echo "| Issue | [#$ISSUE_NUMBER](https://github.com/$REPO/issues/$ISSUE_NUMBER) |"
            echo "| Previous run | $previous_run_value |"
            echo "| Actor | $ACTOR |"
            echo "| Eligible | $ELIGIBLE |"
            echo "| Pre-scaffold gate | ${PRE_GATE_PASSED:-n/a} |"
            echo "| Created | ${CREATED:-n/a} |"
            echo "| Gate passed | ${GATE_PASSED:-n/a} |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "- Review the closeout retrospective sections"
            echo "- Complete the exit checklist and process improvement dispositions"
            echo "- Close the issue when the retrospective is finalized"
          } >> "$GITHUB_STEP_SUMMARY"
