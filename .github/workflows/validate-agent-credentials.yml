name: Validate Agent Credentials
run-name: validate-agent-credentials

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are present
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$OPENAI_API_KEY" ] || { echo "::error::Missing OPENAI_API_KEY"; exit 1; }
          [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Missing ANTHROPIC_API_KEY"; exit 1; }

      - name: Codex API key healthcheck
        id: codex-check
        uses: openai/codex-action@v1
        with:
          prompt: >-
            Reply with exactly the text OPENAI-KEY-OK and nothing else.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-file: ${{ runner.temp }}/codex-healthcheck.txt
          codex-args: "--quiet"

      - name: Verify Codex response
        shell: bash
        run: |
          set -euo pipefail
          output="$(tr -d '\r' < "$RUNNER_TEMP/codex-healthcheck.txt" | xargs)"
          [ "$output" = "OPENAI-KEY-OK" ] || {
            echo "::error::Unexpected Codex response: $output"
            exit 1
          }

      - name: Claude API key healthcheck
        id: claude-check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: >-
            Return structured JSON only. Set status to ok and message to
            "ANTHROPIC-KEY-OK".
          claude_args: >-
            --max-turns 3
            --json-schema .github/schemas/claude-healthcheck.json

      - name: Verify Claude response
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude-check.outputs.structured_output }}
        shell: bash
        run: |
          set -euo pipefail
          status=$(printf '%s' "$STRUCTURED_OUTPUT" | jq -r '.status')
          message=$(printf '%s' "$STRUCTURED_OUTPUT" | jq -r '.message')
          [ "$status" = "ok" ] || { echo "::error::Unexpected Claude status: $status"; exit 1; }
          [ "$message" = "ANTHROPIC-KEY-OK" ] || {
            echo "::error::Unexpected Claude message: $message"
            exit 1
          }
