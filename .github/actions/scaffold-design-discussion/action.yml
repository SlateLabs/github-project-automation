name: 'Scaffold Design Discussion'
description: >
  Creates a GitHub Discussion from a source issue, pre-populated with all
  headings required by the design gate (discussion #3 §4). Posts the discussion
  URL back to the source issue. Idempotent: skips creation if a discussion is
  already linked.

inputs:
  issue_number:
    description: 'Source issue number'
    required: true
  github_token:
    description: 'Token with issues:write and discussions:write scope'
    required: true
  discussion_category:
    description: 'Discussion category name (must already exist in the repo)'
    required: false
    default: 'Ideas'
  run_key:
    description: 'Orchestration run key for traceability'
    required: false
    default: ''
  actor:
    description: 'GitHub login of the actor triggering the scaffold'
    required: false
    default: ''
  template_path:
    description: 'Path to the discussion body template'
    required: false
    default: 'templates/design-discussion.md'

outputs:
  discussion_url:
    description: 'URL of the created (or existing) discussion'
    value: ${{ steps.scaffold.outputs.discussion_url }}
  discussion_number:
    description: 'Number of the created (or existing) discussion'
    value: ${{ steps.scaffold.outputs.discussion_number }}
  created:
    description: '"true" if a new discussion was created, "false" if one already existed'
    value: ${{ steps.scaffold.outputs.created }}

runs:
  using: 'composite'
  steps:
    - name: Scaffold design discussion
      id: scaffold
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        DISCUSSION_CATEGORY: ${{ inputs.discussion_category }}
        RUN_KEY: ${{ inputs.run_key }}
        ACTOR: ${{ inputs.actor }}
        TEMPLATE_PATH: ${{ inputs.template_path }}
      run: |
        set -euo pipefail

        # --- 1. Fetch issue metadata ---
        issue_json=$(gh issue view "$ISSUE_NUMBER" --json title,body,comments 2>&1) || {
          echo "::error::Failed to fetch issue #$ISSUE_NUMBER: $issue_json"
          exit 1
        }

        issue_title=$(echo "$issue_json" | jq -r '.title // ""')
        issue_body=$(echo "$issue_json" | jq -r '.body // ""')

        # --- 2. Check-before-act: owned-artifact discovery ---
        # Three-tier discovery for the owned design discussion:
        #   Tier 1: Scaffold marker comment (<!-- gpa:design-discussion:#N -->)
        #   Tier 2: Discussion URL in issue body (user-placed)
        #   Tier 3: Orphaned discussion recovery via GraphQL search
        # This replaces the broad "any discussion URL in thread" heuristic
        # to avoid false-positive skips from unrelated discussion mentions.
        discussion_url_pattern='https://github\.com/[^/]+/[^/]+/discussions/[0-9]+'
        artifact_marker="gpa:design-discussion:#${ISSUE_NUMBER}"
        repo_full="${GITHUB_REPOSITORY:-SlateLabs/github-project-automation}"

        existing_url=""
        discovery_method=""

        # Tier 1: Search comments for scaffold marker
        comment_count=$(echo "$issue_json" | jq '.comments | length' 2>/dev/null || echo 0)
        for (( i=0; i<comment_count; i++ )); do
          cbody=$(echo "$issue_json" | jq -r ".comments[$i].body // \"\"")
          if echo "$cbody" | grep -qF "$artifact_marker"; then
            existing_url=$(echo "$cbody" | grep -oE "$discussion_url_pattern" | head -1 || true)
            if [ -n "$existing_url" ]; then
              discovery_method="scaffold-marker"
              break
            fi
          fi
        done

        # Tier 2: Search issue body for discussion URL (user-placed)
        if [ -z "$existing_url" ]; then
          existing_url=$(echo "$issue_body" | grep -oE "$discussion_url_pattern" | head -1 || true)
          if [ -n "$existing_url" ]; then
            discovery_method="issue-body"
          fi
        fi

        # Tier 3: Search for orphaned discussion via GraphQL (recovery)
        # Handles partial failure where createDiscussion succeeded but the
        # backlink comment was never posted to the source issue.
        # Uses the owned-artifact marker embedded in the discussion body
        # to deterministically identify discussions created by this scaffold.
        if [ -z "$existing_url" ]; then
          owned_artifact_marker="gpa:owned-artifact:design-discussion:${repo_full}#${ISSUE_NUMBER}"
          search_query="repo:${repo_full} \"${owned_artifact_marker}\" in:body"
          orphan_result=$(gh api graphql -f query='
            query($q: String!) {
              search(query: $q, type: DISCUSSION, first: 5) {
                nodes {
                  ... on Discussion {
                    number
                    url
                    body
                  }
                }
              }
            }' -f q="$search_query" 2>&1) || true

          if [ -n "$orphan_result" ]; then
            # Validate each candidate: the discussion body must contain the
            # exact owned-artifact marker to confirm it was created by this
            # scaffold, not merely referencing the same issue.
            node_count=$(echo "$orphan_result" | jq '.data.search.nodes | length' 2>/dev/null || echo 0)
            for (( j=0; j<node_count; j++ )); do
              candidate_body=$(echo "$orphan_result" | jq -r ".data.search.nodes[$j].body // \"\"" 2>/dev/null || true)
              if echo "$candidate_body" | grep -qF "$owned_artifact_marker"; then
                orphan_url=$(echo "$orphan_result" | jq -r ".data.search.nodes[$j].url // \"\"" 2>/dev/null || true)
                if [ -n "$orphan_url" ] && [ "$orphan_url" != "null" ]; then
                  existing_url="$orphan_url"
                  discovery_method="orphan-recovery"
                  echo "::warning::Found orphaned discussion (backlink missing): $existing_url — healing backlink"
                  break
                fi
              fi
            done
          fi
        fi

        if [ -n "$existing_url" ]; then
          existing_number=$(echo "$existing_url" | grep -oE '[0-9]+$')
          echo "::notice::Discussion found via $discovery_method: $existing_url — skipping creation"

          echo "discussion_url=$existing_url" >> "$GITHUB_OUTPUT"
          echo "discussion_number=$existing_number" >> "$GITHUB_OUTPUT"
          echo "created=false" >> "$GITHUB_OUTPUT"

          # Post informational comment with owned-artifact marker —
          # build table rows conditionally to avoid blank lines that break
          # Markdown table rendering
          table_rows="| Field | Value |
        |-------|-------|"
          if [ -n "$RUN_KEY" ]; then
            table_rows="${table_rows}
        | **Run key** | \`$RUN_KEY\` |"
          fi
          if [ -n "$ACTOR" ]; then
            table_rows="${table_rows}
        | **Actor** | @$ACTOR |"
          fi
          table_rows="${table_rows}
        | **Discussion** | $existing_url |
        | **Discovery** | $discovery_method |
        | **Result** | :fast_forward: Skipped — discussion already linked |"

          gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
        ### Design discussion scaffold — already exists
        <!-- $artifact_marker -->

        $table_rows

        A design discussion is already linked to this issue. No new discussion was created.
        COMMENT_EOF
          )"

          exit 0
        fi

        # --- 3. Render template ---
        if [ ! -f "$TEMPLATE_PATH" ]; then
          echo "::error::Template file not found at $TEMPLATE_PATH"
          exit 1
        fi

        repo_full="${GITHUB_REPOSITORY:-SlateLabs/github-project-automation}"

        # Use python3 for safe template rendering — sed is unsafe because
        # issue titles can contain the delimiter character, &, \, etc.
        export ISSUE_TITLE_SAFE="$issue_title"
        export REPO_FULL="$repo_full"
        rendered_body=$(python3 -c 'import sys,os; t=open(sys.argv[1]).read(); t=t.replace("{{issue_title}}",os.environ["ISSUE_TITLE_SAFE"]); t=t.replace("{{issue_number}}",os.environ["ISSUE_NUMBER"]); t=t.replace("{{repo}}",os.environ["REPO_FULL"]); sys.stdout.write(t)' "$TEMPLATE_PATH")

        # --- 4. Resolve discussion category ID via GraphQL ---
        repo_owner="${GITHUB_REPOSITORY_OWNER:-SlateLabs}"
        repo_name="${GITHUB_REPOSITORY#*/}"
        repo_name="${repo_name:-github-project-automation}"

        category_query=$(gh api graphql -f query='
          query($owner: String!, $name: String!) {
            repository(owner: $owner, name: $name) {
              id
              discussionCategories(first: 25) {
                nodes { id name }
              }
            }
          }' -f owner="$repo_owner" -f name="$repo_name" 2>&1) || {
          echo "::error::Failed to query discussion categories: $category_query"
          exit 1
        }

        repo_id=$(echo "$category_query" | jq -r '.data.repository.id // ""')
        if [ -z "$repo_id" ] || [ "$repo_id" = "null" ]; then
          echo "::error::Could not resolve repository ID. Ensure discussions are enabled on the repo."
          exit 1
        fi

        category_id=$(echo "$category_query" | jq -r \
          --arg cat "$DISCUSSION_CATEGORY" \
          '.data.repository.discussionCategories.nodes[] | select(.name == $cat) | .id' 2>/dev/null || true)

        if [ -z "$category_id" ] || [ "$category_id" = "null" ]; then
          available=$(echo "$category_query" | jq -r '.data.repository.discussionCategories.nodes[].name' | tr '\n' ', ' | sed 's/,$//')
          echo "::error::Discussion category '$DISCUSSION_CATEGORY' not found. Available categories: $available"
          exit 1
        fi

        # --- 5. Create discussion via GraphQL ---
        discussion_title="Design: $issue_title"

        create_result=$(gh api graphql -f query='
          mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
            createDiscussion(input: {
              repositoryId: $repoId,
              categoryId: $categoryId,
              title: $title,
              body: $body
            }) {
              discussion {
                id
                number
                url
              }
            }
          }' \
          -f repoId="$repo_id" \
          -f categoryId="$category_id" \
          -f title="$discussion_title" \
          -f body="$rendered_body" 2>&1) || {
          echo "::error::GraphQL createDiscussion mutation failed: $create_result"
          exit 1
        }

        new_url=$(echo "$create_result" | jq -r '.data.createDiscussion.discussion.url // ""')
        new_number=$(echo "$create_result" | jq -r '.data.createDiscussion.discussion.number // ""')

        if [ -z "$new_url" ] || [ "$new_url" = "null" ]; then
          echo "::error::createDiscussion succeeded but returned no URL. Response: $create_result"
          exit 1
        fi

        echo "::notice::Discussion created: $new_url"

        echo "discussion_url=$new_url" >> "$GITHUB_OUTPUT"
        echo "discussion_number=$new_number" >> "$GITHUB_OUTPUT"
        echo "created=true" >> "$GITHUB_OUTPUT"

        # --- 6. Post comment on source issue ---
        # Build table rows conditionally to avoid blank lines that break Markdown tables
        table_rows="| Field | Value |
        |-------|-------|"
        if [ -n "$RUN_KEY" ]; then
          table_rows="${table_rows}
        | **Run key** | \`$RUN_KEY\` |"
        fi
        if [ -n "$ACTOR" ]; then
          table_rows="${table_rows}
        | **Actor** | @$ACTOR |"
        fi
        table_rows="${table_rows}
        | **Discussion** | $new_url |
        | **Result** | :white_check_mark: Discussion created |"

        gh issue comment "$ISSUE_NUMBER" --body "$(cat <<COMMENT_EOF
        ### Design discussion scaffold — created
        <!-- gpa:design-discussion:#${ISSUE_NUMBER} -->

        $table_rows

        A design discussion has been created with all required gate headings.
        Fill in each section, resolve open questions, and get at least one review comment to pass the design gate.
        COMMENT_EOF
        )"
