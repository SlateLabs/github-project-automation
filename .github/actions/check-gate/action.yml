name: 'Check Gate'
description: >
  Verifies the gate conditions for a requested stage transition per
  discussion #3 §4. Each gate has machine-testable artifact requirements.
  Supports GATE-WAIVER comments posted by trusted actors.

inputs:
  issue_number:
    description: 'Issue number to check gates for'
    required: true
  requested_stage:
    description: 'Target stage for the transition'
    required: true
  issue_body:
    description: 'Body of the issue (passed from validate-eligibility)'
    required: true
  github_token:
    description: 'Token with repo and project read access'
    required: true

outputs:
  gate_passed:
    description: '"true" if all gate conditions are met or waived'
    value: ${{ steps.gate.outputs.gate_passed }}
  unmet_conditions:
    description: 'JSON array of unmet gate conditions'
    value: ${{ steps.gate.outputs.unmet_conditions }}
  waived_conditions:
    description: 'JSON array of waived gate conditions'
    value: ${{ steps.gate.outputs.waived_conditions }}

runs:
  using: 'composite'
  steps:
    - name: Check gate conditions
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        REQUESTED_STAGE: ${{ inputs.requested_stage }}
        ISSUE_BODY: ${{ inputs.issue_body }}
      run: |
        set -euo pipefail

        unmet=()
        waived=()

        # --- Fetch GATE-WAIVER comments for this issue ---
        waivers=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
          --jq '.comments[].body' 2>/dev/null | grep -oP 'GATE-WAIVER:\s*\K[^\n—–-]+' || true)

        check_waiver() {
          local gate_name="$1"
          if echo "$waivers" | grep -qi "$gate_name"; then
            waived+=("$gate_name")
            return 0
          fi
          return 1
        }

        # --- Gate checks by stage ---
        case "$REQUESTED_STAGE" in
          kickoff)
            # Gate 1→2: Backlog triage
            # Issue exists (already validated by eligibility check)
            # Issue body contains ## Summary heading
            if ! echo "$ISSUE_BODY" | grep -qE '^#{1,2}\s+Summary'; then
              if ! check_waiver "kickoff"; then
                unmet+=("Issue body must contain a ## Summary heading")
              fi
            fi
            ;;

          clarification)
            # Gate 2→3: Clarification (§4 Gate 2→3)
            if ! echo "$ISSUE_BODY" | grep -qE '^#{1,2}\s+Summary'; then
              if ! check_waiver "clarification-summary"; then
                unmet+=("Issue body must contain a ## Summary heading")
              fi
            fi
            if ! echo "$ISSUE_BODY" | grep -qE '^#{1,2}\s+(Scope|Open Questions)'; then
              if ! check_waiver "clarification-scope"; then
                unmet+=("Issue body must contain a ## Scope or ## Open Questions heading")
              fi
            fi

            # Check for blocked label (§4 Gate 2→3, check 2)
            issue_labels=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$issue_labels" | grep -qx "blocked"; then
              if ! check_waiver "clarification-blocked"; then
                unmet+=("Issue has 'blocked' label — remove the label before advancing to clarification")
              fi
            fi

            # Check open questions resolution (§4 Gate 2→3, check 3)
            # If ## Open Questions section exists, each list item must be struck through or marked DEFERRED-TO-DESIGN
            if echo "$ISSUE_BODY" | grep -qE '^#{1,2}\s+Open Questions'; then
              oq_section=$(echo "$ISSUE_BODY" | sed -n '/^##\{0,1\} Open Questions/,/^##\{0,1\} [^O]/p' | tail -n +2)
              unresolved_items=$(echo "$oq_section" | grep -E '^\s*[-*]\s+' | grep -vE '(~~|DEFERRED-TO-DESIGN)' || true)
              if [ -n "$unresolved_items" ]; then
                if ! check_waiver "clarification-open-questions"; then
                  unresolved_count=$(echo "$unresolved_items" | wc -l | tr -d ' ')
                  unmet+=("$unresolved_count open question(s) are unresolved — strike through or mark DEFERRED-TO-DESIGN")
                fi
              fi
            fi
            ;;

          design)
            # Gate 3→4: Design discussion (§4 Gate 3→4 checks 1–4)
            # 1. A discussion must be linked from issue body or comments
            discussion_url=""
            discussion_number=""

            # Search issue body first
            discussion_url=$(echo "$ISSUE_BODY" | grep -oE 'https://github\.com/[^/]+/[^/]+/discussions/[0-9]+' | head -1 || true)
            if [ -z "$discussion_url" ]; then
              # Search comments
              comments_text=$(gh issue view "$ISSUE_NUMBER" --comments --json comments \
                --jq '.comments[].body' 2>/dev/null || true)
              discussion_url=$(echo "$comments_text" | grep -oE 'https://github\.com/[^/]+/[^/]+/discussions/[0-9]+' | head -1 || true)
            fi

            if [ -z "$discussion_url" ]; then
              if ! check_waiver "design"; then
                unmet+=("A GitHub Discussion must be linked from the issue (body or comment containing discussions/<number>)")
              fi
            else
              # Extract discussion number from URL
              discussion_number=$(echo "$discussion_url" | grep -oE '[0-9]+$')
              repo_path=$(echo "$discussion_url" | sed 's|https://github.com/||' | sed "s|/discussions/$discussion_number||")
              repo_owner=$(echo "$repo_path" | cut -d/ -f1)
              repo_name=$(echo "$repo_path" | cut -d/ -f2)

              # 2. Fetch discussion body and check required headings
              # Use GraphQL to fetch discussion content
              discussion_body=$(gh api graphql -f query='
                query($owner: String!, $name: String!, $number: Int!) {
                  repository(owner: $owner, name: $name) {
                    discussion(number: $number) {
                      body
                      author { login }
                      comments(first: 50) {
                        nodes { author { login } }
                      }
                    }
                  }
                }' -f owner="$repo_owner" -f name="$repo_name" -F number="$discussion_number" 2>&1) || {
                # API failure → fail closed with the error
                if ! check_waiver "design-api"; then
                  unmet+=("Failed to fetch discussion #$discussion_number via API: $discussion_body")
                fi
                discussion_body=""
              }

              if [ -n "$discussion_body" ]; then
                disc_text=$(echo "$discussion_body" | jq -r '.data.repository.discussion.body // ""')
                disc_author=$(echo "$discussion_body" | jq -r '.data.repository.discussion.author.login // ""')

                # Check required headings in discussion body
                required_headings=("Summary" "Problem" "Goals" "Non-goals" "Proposed Approach")
                for heading in "${required_headings[@]}"; do
                  if ! echo "$disc_text" | grep -qE "^#{1,2}\s+${heading}"; then
                    waiver_key="design-heading-$(echo "$heading" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')"
                    if ! check_waiver "$waiver_key"; then
                      unmet+=("Discussion #$discussion_number is missing required heading: ## $heading")
                    fi
                  fi
                done

                # 3. Check open questions resolution
                if echo "$disc_text" | grep -qE '^#{1,2}\s+Open Questions'; then
                  oq_section=$(echo "$disc_text" | sed -n '/^##\{0,1\} Open Questions/,/^##\{0,1\} [^O]/p' | tail -n +2)
                  unresolved_oq=$(echo "$oq_section" | grep -E '^\s*[-*]\s+' | grep -vE '(~~|DEFERRED-TO-PLAN)' || true)
                  if [ -n "$unresolved_oq" ]; then
                    if ! check_waiver "design-open-questions"; then
                      oq_count=$(echo "$unresolved_oq" | wc -l | tr -d ' ')
                      unmet+=("Discussion #$discussion_number has $oq_count unresolved open question(s) — strike through or mark DEFERRED-TO-PLAN")
                    fi
                  fi
                fi

                # 4. Check for non-author review comment
                commenter_logins=$(echo "$discussion_body" | jq -r '.data.repository.discussion.comments.nodes[].author.login // ""' 2>/dev/null || true)
                has_non_author_comment="false"
                while IFS= read -r commenter; do
                  if [ -n "$commenter" ] && [ "$commenter" != "$disc_author" ]; then
                    has_non_author_comment="true"
                    break
                  fi
                done <<< "$commenter_logins"

                if [ "$has_non_author_comment" = "false" ]; then
                  if ! check_waiver "design-review"; then
                    unmet+=("Discussion #$discussion_number has no comments from anyone other than the author ($disc_author) — at least one review comment is required")
                  fi
                fi
              fi
            fi
            ;;

          plan)
            # Gate 4→5: Implementation plan (§4 Gate implementation contract, rule 4)
            # All required headings must appear in the SAME comment, not scattered.
            comments_json=$(gh issue view "$ISSUE_NUMBER" --comments --json comments 2>/dev/null || echo '{"comments":[]}')
            plan_comment_found="false"
            plan_missing_headings=()

            # Iterate over each comment individually
            comment_count=$(echo "$comments_json" | jq '.comments | length')
            for (( i=0; i<comment_count; i++ )); do
              comment_body=$(echo "$comments_json" | jq -r ".comments[$i].body // \"\"")

              # Only examine comments that contain the anchor heading
              if echo "$comment_body" | grep -qE '^#{1,2}\s+Implementation Plan'; then
                plan_comment_found="true"
                plan_missing_headings=()

                # Check all required headings in THIS comment
                if ! echo "$comment_body" | grep -qE '^#{1,2}\s+Acceptance Criteria'; then
                  plan_missing_headings+=("## Acceptance Criteria")
                fi
                if ! echo "$comment_body" | grep -qE '^#{1,2}\s+Verification Plan'; then
                  plan_missing_headings+=("## Verification Plan")
                fi
                if ! echo "$comment_body" | grep -qE '^#{1,2}\s+Review Expectations'; then
                  plan_missing_headings+=("## Review Expectations")
                fi
                if ! echo "$comment_body" | grep -qE '^#{1,2}\s+(Slices|Execution)'; then
                  plan_missing_headings+=("## Slices (or ## Execution)")
                fi

                # If this comment has all headings, we're done
                if [ ${#plan_missing_headings[@]} -eq 0 ]; then
                  break
                fi
              fi
            done

            if [ "$plan_comment_found" = "false" ]; then
              if ! check_waiver "plan-exists"; then
                unmet+=("No comment contains ## Implementation Plan heading")
              fi
            elif [ ${#plan_missing_headings[@]} -gt 0 ]; then
              # Found a plan comment but it's missing required headings
              for heading in "${plan_missing_headings[@]}"; do
                waiver_key="plan-$(echo "$heading" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]' '-' | sed 's/^-//;s/-$//')"
                if ! check_waiver "$waiver_key"; then
                  unmet+=("Plan comment is missing required heading: $heading (all required headings must be co-located in a single comment)")
                fi
              done
            fi
            ;;

          execution)
            # Gate 5→6: Execution
            # Check for branch matching <issue-number>-* or <issue-number>/*
            branch_exists=$(gh api "repos/{owner}/{repo}/branches" --paginate \
              --jq ".[].name | select(test(\"^${ISSUE_NUMBER}[-/]\"))" 2>/dev/null | head -1 || true)
            if [ -z "$branch_exists" ]; then
              if ! check_waiver "execution-branch"; then
                unmet+=("A branch matching ${ISSUE_NUMBER}-* or ${ISSUE_NUMBER}/* must exist")
              fi
            fi

            # Check for PR referencing this issue
            pr_exists=$(gh pr list --search "issue:${ISSUE_NUMBER}" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -z "$pr_exists" ]; then
              if ! check_waiver "execution-pr"; then
                unmet+=("A pull request referencing issue #${ISSUE_NUMBER} must exist")
              fi
            fi
            ;;

          review|merge|closeout)
            # §4 Gate implementation contract, rule 1: unimplemented gates must reject.
            # Full checks (CI status, approvals, merge state) depend on Slice 4 creating
            # the artifacts they verify. Use GATE-WAIVER to advance manually.
            if ! check_waiver "$REQUESTED_STAGE"; then
              unmet+=("Gate '${REQUESTED_STAGE}' is not yet implemented. Use GATE-WAIVER: ${REQUESTED_STAGE} — <reason> to advance manually.")
            fi
            ;;

          *)
            unmet+=("Unknown stage: $REQUESTED_STAGE")
            ;;
        esac

        # --- Output results ---
        # Convert arrays to JSON
        unmet_json=$(printf '%s\n' "${unmet[@]+"${unmet[@]}"}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
        waived_json=$(printf '%s\n' "${waived[@]+"${waived[@]}"}" | jq -R -s -c 'split("\n") | map(select(. != ""))')

        if [ ${#unmet[@]} -eq 0 ] 2>/dev/null || [ -z "${unmet[*]+x}" ]; then
          echo "gate_passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "gate_passed=false" >> "$GITHUB_OUTPUT"
        fi

        echo "unmet_conditions=$unmet_json" >> "$GITHUB_OUTPUT"
        echo "waived_conditions=$waived_json" >> "$GITHUB_OUTPUT"
